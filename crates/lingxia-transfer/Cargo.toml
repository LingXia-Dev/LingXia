[package]
name = "lingxia-transfer"
version.workspace = true
edition.workspace = true
description = "Shared file transfer domain/runtime for LingXia"
license = "MIT"
readme = "README.md"

[dependencies]
lingxia-settings = { workspace = true }
lingxia-webview = { workspace = true }
tokio = { workspace = true }
http = { workspace = true }
dashmap = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
log = { workspace = true }
ring = "0.17.14"
bytes = "1.11"
http-body-util = { workspace = true, features = ["channel"] }
redb = "3.1.0"
rong_rt = { workspace = true, default-features = false }
rong = { workspace = true, default-features = false }

[target.'cfg(any(target_os = "android", target_os = "ios", all(target_os = "linux", target_env = "ohos")))'.dependencies]
rong_rt = { workspace = true, default-features = false, features = ["tls-ring"] }

[target.'cfg(not(any(target_os = "android", target_os = "ios", all(target_os = "linux", target_env = "ohos"))))'.dependencies]
rong_rt = { workspace = true, default-features = false, features = ["tls-aws-lc"] }
