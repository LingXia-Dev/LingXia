[package]
name = "lingxia-windows-contract"
version.workspace = true
edition.workspace = true
description = "Windows host UI contracts (traits, types, registry) shared between the LingXia logic layer and the Windows SDK implementation"
license = "MIT"
repository.workspace = true
keywords = ["lingxia", "windows", "contract", "ui"]
categories = ["gui", "os::windows-apis"]

[dependencies]
log = { workspace = true }
serde_json = { workspace = true }
lingxia-webview = { workspace = true }

# Windows-only: this crate is a no-op (`#![cfg(windows)]`) off-Windows, so the
# `windows` dependency must be target-gated too — otherwise `cargo clippy
# --workspace` on macOS pulls `windows-future`, which doesn't build there.
[target.'cfg(target_os = "windows")'.dependencies]
windows = { workspace = true, features = [
    "Win32_Foundation",
    "Win32_Graphics_Gdi",
] }
