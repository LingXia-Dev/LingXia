[package]
name = "lingxia"
version.workspace = true
edition.workspace = true
description = "LingXia - Cross-platform LxApp (lightweight application) framework for Android, iOS, and HarmonyOS"
license = "MIT"
repository = "https://github.com/LingXia-Dev/LingXia"
keywords = ["lingxia", "lxapp", "cross-platform", "webview"]
categories = ["web-programming", "api-bindings"]

[features]
default = ["browser", "js-lxapp"]
browser = ["dep:lingxia-browser"]
js-lxapp = ["lxapp/js-lxapp", "dep:lingxia-logic"]
shell = ["browser", "dep:lingxia-shell"]
webview-input = ["lingxia-webview/webview-input"]

[dependencies]
rong = { workspace = true, default-features = false }
rong_rt = { workspace = true, default-features = false }
lxapp = { workspace = true }
lingxia-log = { workspace = true }
lingxia-provider = { workspace = true }
lingxia-update = { workspace = true }
lingxia-app-context = { workspace = true }
lingxia-media = { workspace = true }
lingxia-service = { workspace = true }
lingxia-browser = { workspace = true, optional = true }
lingxia-logic = { workspace = true, optional = true }
lingxia-shell = { workspace = true, optional = true }
lingxia-platform = { workspace = true }
lingxia-webview = { workspace = true }
lingxia-messaging = { workspace = true }
lingxia-native-macros = { workspace = true }
log = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }

[target.'cfg(target_os = "android")'.dependencies]
jni = "0.22.1"
android_logger = "0.15.0"

[target.'cfg(any(target_os = "ios", target_os = "macos"))'.dependencies]
swift-bridge = "0.1.59"
oslog = "0.2.0"

[target.'cfg(target_env = "ohos")'.dependencies]
ohos_hilog = "0.1.3"
napi-ohos = "1.1.0"
napi-derive-ohos = "1.1.0"

[build-dependencies]
swift-bridge-build = "0.1.59"
napi-build-ohos = "1.1.0"

[dev-dependencies]
tempfile = "3"
