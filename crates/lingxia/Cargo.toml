[package]
name = "lingxia"
version.workspace = true
edition.workspace = true
description = "LingXia - Cross-platform LxApp (lightweight application) framework for Android, iOS, macOS, HarmonyOS, and Windows"
license = "MIT"
repository.workspace = true
keywords = ["lingxia", "lxapp", "cross-platform", "webview"]
categories = ["web-programming", "api-bindings"]

[features]
default = ["standard"]
standard = ["lxapp/standard", "dep:lingxia-logic"]
automation = ["dep:lingxia-automation"]
automation-runtime = ["automation", "lingxia-automation/runtime"]
# Apple hard cancellation for non-yielding scripts; uses JSC's private
# execution-time-limit SPI and is therefore opt-in for product hosts.
automation-runtime-interrupt = ["automation-runtime", "lingxia-automation/runtime-interrupt"]
devtool = ["lxapp/automation"]
process = ["lxapp/process"]
# Low-level managed browser tabs. Advanced hosts may provide their own native
# browser UI/chrome on top of this.
browser-runtime = ["dep:lingxia-browser"]
browser-core = ["browser-runtime"]
# Product browser shell: browser core + browser shell webui/settings/downloads/address
# bar support.
browser-shell = ["browser-runtime", "dep:lingxia-browser-shell"]
proxy = ["browser-shell", "lingxia-browser-shell/proxy"]
terminal-runtime = ["dep:lingxia-terminal"]
webview-input = ["lingxia-webview/webview-input"]

[dependencies]
rong_rt = { workspace = true, default-features = false }
lxapp = { workspace = true, default-features = false }
lingxia-log = { workspace = true }
lingxia-provider = { workspace = true }
lingxia-update = { workspace = true }
lingxia-app-context = { workspace = true }
lingxia-media = { workspace = true }
lingxia-service = { workspace = true }
lingxia-transfer = { workspace = true }
lingxia-terminal = { workspace = true, optional = true }
lingxia-browser = { workspace = true, optional = true }
lingxia-logic = { workspace = true, optional = true }
lingxia-automation = { workspace = true, optional = true }
lingxia-browser-shell = { workspace = true, optional = true }
lingxia-platform = { workspace = true }
lingxia-shell = { workspace = true }
lingxia-surface = { workspace = true }
lingxia-webview = { workspace = true }
lingxia-windows-contract = { workspace = true }
lingxia-messaging = { workspace = true }
lingxia-native-macros = { workspace = true }
log = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }

[target.'cfg(target_os = "android")'.dependencies]
jni = "0.22.1"
android_logger = "0.15.0"

[target.'cfg(any(target_os = "ios", target_os = "macos"))'.dependencies]
swift-bridge = "0.1.59"
oslog = "0.2.0"

[target.'cfg(target_env = "ohos")'.dependencies]
ohos_hilog = "0.1.3"
napi-ohos = "1.1.0"
napi-derive-ohos = "1.1.0"
base64 = { workspace = true }

[build-dependencies]
swift-bridge-build = "0.1.59"
napi-build-ohos = "1.1.0"

[dev-dependencies]
tempfile = "3"
