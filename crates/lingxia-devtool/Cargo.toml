[package]
name = "lingxia-devtool"
version.workspace = true
edition.workspace = true
description = "Devtool runtime bridge and protocol helpers for LingXia apps"
license = "MIT"
repository = "https://github.com/LingXia-Dev/LingXia"

[features]
default = []
browser = ["dep:lingxia-browser"]

[dependencies]
lingxia = { path = "../lingxia", default-features = false }
lingxia-browser = { workspace = true, optional = true }
log = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tungstenite = { version = "0.29", features = ["native-tls"] }
