[package]
name = "lingxia-devtool"
version.workspace = true
edition.workspace = true
description = "Native devtool entry library for LingXia Runner"
license = "MIT"
repository = "https://github.com/LingXia-Dev/LingXia"

[lib]
name = "lingxia"
crate-type = ["rlib", "staticlib"]

[dependencies]
lingxia = { workspace = true, features = ["shell"] }
log = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tungstenite = { version = "0.29", features = ["native-tls"] }

[target.'cfg(any(target_os = "ios", target_os = "macos"))'.dependencies]
swift-bridge = "0.1.57"
