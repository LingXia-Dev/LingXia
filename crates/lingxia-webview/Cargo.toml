[package]
name = "lingxia-webview"
version.workspace = true
edition.workspace = true
description = "WebView abstraction layer for LingXia framework (Android, iOS, HarmonyOS)"
license = "MIT"
repository = "https://github.com/LingXia-Dev/LingXia"
keywords = ["lingxia", "webview", "lxapp", "cross-platform"]
categories = ["web-programming", "api-bindings"]

[features]
default = []
webview-input = []

[dependencies]
async-trait = "0.1"
log = { workspace = true }
thiserror =  { workspace = true }

# Use workspace dependencies
serde = { workspace = true }
serde_json = { workspace = true }
http = { workspace = true }
tokio = { workspace = true, features = ["sync", "time"] }

# Android-specific dependencies
[target.'cfg(target_os = "android")'.dependencies]
base64 = { workspace = true }
jni = "0.22.1"
android_logger = "0.15.0"

# iOS/macOS-specific dependencies for proper os_log integration
[target.'cfg(any(target_os = "ios", target_os = "macos"))'.dependencies]
oslog = "0.2.0"
# objc2 dependencies for direct WebView management
objc2 = { version = "0.6", features = ["exception"] }
objc2-web-kit = "0.3"
objc2-foundation = "0.3"
# block2 for Objective-C blocks and delegates
block2 = "0.6"
# GCD dispatch for main thread operations
dispatch2 = "0.3"

[target.'cfg(target_os = "macos")'.dependencies]
objc2-app-kit = { version = "0.3", default-features = false, features = ["NSEvent", "NSGraphicsContext", "NSResponder", "NSView", "NSWindow", "objc2-core-graphics"] }
objc2-core-foundation = "0.3"
objc2-core-graphics = { version = "0.3", default-features = false, features = ["CGBase", "CGEvent", "CGEventSource", "CGEventTypes", "CGGeometry", "CGRemoteOperation", "libc", "objc2"] }
libc = "0.2"

[target.'cfg(all(target_os = "linux", target_env = "ohos"))'.dependencies]
base64 = { workspace = true }
ohos_hilog = "0.1"
napi-ohos = "1.1.4"
napi-derive-ohos = "1.1.4"
ohos-raw-sys="0.1.0"
ohos-web-sys="0.0.1"
