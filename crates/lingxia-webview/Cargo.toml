[package]
name = "lingxia-webview"
version.workspace = true
edition.workspace = true
description = "WebView abstraction layer for LingXia framework (Android, iOS, HarmonyOS, Windows)"
license = "MIT"
repository.workspace = true
keywords = ["lingxia", "webview", "lxapp", "cross-platform"]
categories = ["web-programming", "api-bindings"]

[features]
default = []
webview-input = []
# Expose NavigationId::from_raw so downstream crates can build synthetic
# NavigationEvent sequences in their own unit tests.
test-support = []

[dependencies]
async-trait = "0.1"
log = { workspace = true }
thiserror =  { workspace = true }

# Use workspace dependencies
serde = { workspace = true }
serde_json = { workspace = true }
http = { workspace = true }
tokio = { workspace = true, features = ["sync", "time"] }

# Android-specific dependencies
[target.'cfg(target_os = "android")'.dependencies]
base64 = { workspace = true }
jni = "0.22.1"
android_logger = "0.15.0"

# iOS/macOS-specific dependencies for proper os_log integration
[target.'cfg(any(target_os = "ios", target_os = "macos"))'.dependencies]
oslog = "0.2.0"
# objc2 dependencies for direct WebView management
objc2 = { version = "0.6", features = ["exception"] }
objc2-web-kit = { version = "0.3", features = ["WKHTTPCookieStore"] }
objc2-foundation = { version = "0.3", features = ["NSDictionary", "NSHTTPCookie", "NSDate"] }
# block2 for Objective-C blocks and delegates
block2 = "0.6"
# GCD dispatch for main thread operations
dispatch2 = "0.3"

[target.'cfg(target_os = "macos")'.dependencies]
objc2-app-kit = { version = "0.3", default-features = false, features = ["NSEvent", "NSGraphicsContext", "NSResponder", "NSView", "NSWindow", "objc2-core-graphics"] }
objc2-core-foundation = "0.3"
objc2-core-graphics = { version = "0.3", default-features = false, features = ["CGBase", "CGEvent", "CGEventSource", "CGEventTypes", "CGGeometry", "CGRemoteOperation", "libc", "objc2"] }
libc = "0.2"

[target.'cfg(all(target_os = "linux", target_env = "ohos"))'.dependencies]
base64 = { workspace = true }
ohos_hilog = "0.1"
napi-ohos = "1.1.4"
napi-derive-ohos = "1.1.4"
ohos-raw-sys="0.1.0"
ohos-web-sys="0.0.1"

[target.'cfg(target_os = "windows")'.dependencies]
base64 = { workspace = true }
webview2-com = "0.39.1"
windows = { workspace = true, features = [
    "Win32_Foundation",
    "Win32_Graphics_DirectComposition",
    "Win32_Graphics_Dwm",
    "Win32_Graphics_Gdi",
    "Win32_System_Com",
    "Win32_System_Com_StructuredStorage",
    "Win32_System_LibraryLoader",
    "Win32_System_Memory",
    "Win32_System_Ole",
    "Win32_System_Threading",
    "Win32_UI_Controls",
    "Win32_UI_HiDpi",
    "Win32_UI_Input_KeyboardAndMouse",
    "Win32_UI_Shell",
    "Win32_UI_WindowsAndMessaging",
] }
