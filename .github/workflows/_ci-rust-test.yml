# Reusable workflow: workspace tests (advisory — not a CI gate).
# Called by ci.yml.
#
# The suite has pre-existing environment-dependent tests (lingxia-terminal
# dlopen's libghostty-vt.dylib; lingxia-transfer asserts on wall-clock
# ordering), so it is informational until those are stabilized. The blocking
# compile gate is the `check` job in _ci-rust.yml.

name: Internal / Rust Test

on:
  workflow_call:

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.95.0"
  ZIG_VERSION: "0.15.2"

jobs:
  test:
    name: Test
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: Swatinem/rust-cache@v2

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - uses: ./.github/actions/build-web-runtime

      - name: Test all workspace crates
        run: cargo test --workspace --exclude lingxia-terminal
