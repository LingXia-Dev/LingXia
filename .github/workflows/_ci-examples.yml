# Reusable workflow: build the example apps (advisory — not a CI gate yet).
# Called by ci.yml.
#
#   - macOS / iOS: `lingxia build` on macos-latest after the apple SDK asset
#     bootstrap. The showcase lxapp ships both react and vue variants per page,
#     so the build needs an explicit --framework.
#   - Android: `lingxia build` on ubuntu with the SDK/NDK + gradle.
#   - Harmony lives in its own workflow (_ci-harmony.yml): it builds with the
#     public OpenHarmony command-line tools (hvigor/ohpm/SDK from
#     repo.huaweicloud.com) and is kept separate while that lane is verified.

name: Internal / Examples

on:
  workflow_call:
    inputs:
      run_ios:
        type: boolean
        default: true
      run_macos:
        type: boolean
        default: true
      run_android:
        type: boolean
        default: true

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.95.0"
  ZIG_VERSION: "0.15.2"

jobs:
  macos:
    name: example-macos
    if: ${{ inputs.run_macos }}
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      # Use the newest Xcode (26 = Swift 6.2) to match the dev toolchain; the
      # iOS media SDK relies on Swift 6.2 concurrency inference that the default
      # Xcode 16 (Swift 6.0/6.1) lacks.
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: example-macos
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - uses: ./.github/actions/build-web-packages
      - uses: ./.github/actions/bootstrap-apple-sdk
      - name: Build macOS example app
        working-directory: examples
        run: cargo run -p lingxia-cli -- build --platform macos --framework react
      - name: Upload macOS app
        uses: actions/upload-artifact@v4
        with:
          name: example-macos-app
          path: examples/macos/.lingxia/*.app
          if-no-files-found: warn

  ios:
    name: example-ios
    if: ${{ inputs.run_ios }}
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      # The iOS SDK (media subsystem) compiles under Swift 6.2 but not the
      # default Xcode 16's Swift 6.0/6.1 strict concurrency. Select the newest
      # Xcode (26 = Swift 6.2) to match the dev toolchain.
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Show active Xcode/Swift
        run: xcodebuild -version && swift --version
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: aarch64-apple-ios
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: example-ios
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - uses: ./.github/actions/build-web-packages
      - uses: ./.github/actions/bootstrap-apple-sdk
      - name: Build iOS example app
        working-directory: examples
        run: cargo run -p lingxia-cli -- build --platform ios --framework react
      - name: Upload iOS app
        uses: actions/upload-artifact@v4
        with:
          name: example-ios-app
          path: examples/ios/.lingxia/*.app
          if-no-files-found: warn

  android:
    name: example-android
    if: ${{ inputs.run_android }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: aarch64-linux-android
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: example-android
      - uses: ./.github/actions/build-web-packages
      # Generate the gitignored android SDK drawables/strings the Kotlin
      # references (R.drawable.* / R.string.*).
      - uses: ./.github/actions/bootstrap-android-sdk
      - name: Expose Android NDK to lingxia build
        run: echo "ANDROID_NDK_HOME=${ANDROID_NDK_LATEST_HOME:-$ANDROID_NDK_ROOT}" >> "$GITHUB_ENV"
      - name: Build Android example app
        working-directory: examples
        run: cargo run -p lingxia-cli -- build --platform android --framework react
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: example-android-apk
          path: examples/android/app/build/outputs/**/*.apk
          if-no-files-found: warn
