# Harmony example — native cross-compile verification (NOT a per-PR gate yet).
#
# Verifies the example's native Rust library cross-compiles + links for
# aarch64-unknown-linux-ohos using the PUBLIC OpenHarmony SDK (no Huawei
# account): the SDK tarball on repo.huaweicloud.com ships the media NDK libs
# the runtime links (e.g. libavtranscoder, which the command-line tools'
# bundled "default" SDK lacks).
#
# The full .hap is intentionally NOT built here. `hvigor assembleHap` needs a
# HarmonyOS SDK at the example's API level (6.0.1 / API 21), which is gated
# behind a Huawei account and not publicly downloadable — the public API-21 SDK
# is OpenHarmony-only (no hms/ components for runtimeOS: HarmonyOS), and the
# public HarmonyOS command-line tools top out at API 18. Build the .hap on a
# self-hosted runner or a private image that has the gated SDK.
#
# Trigger manually (Actions ▸ run workflow) or by pushing to the feature branch.

name: Internal / Harmony Example (native)

on:
  workflow_dispatch: {}
  push:
    branches: [ci/cross-platform-builds]
    paths:
      - '.github/workflows/_ci-harmony.yml'
      - '.github/actions/bootstrap-harmony-sdk/**'
      - 'lingxia-sdk/harmony/**'
      - 'examples/harmony/**'
      - 'crates/lingxia-webview/src/harmony/**'

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.95.0"
  # Public OpenHarmony SDK (no Huawei account) — provides the native NDK,
  # including the media libs the runtime links.
  OHOS_SDK_VERSION: "6.1-Release"
  OHOS_SDK_URL: "https://repo.huaweicloud.com/openharmony/os/6.1-Release/ohos-sdk-windows_linux-public.tar.gz"

jobs:
  harmony-native:
    name: example-harmony-native
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: aarch64-unknown-linux-ohos

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: example-harmony

      # lxapp web bundle + native client codegen the native build links against.
      - uses: ./.github/actions/build-web-packages

      # Native NDK from the public OpenHarmony SDK tarball.
      - name: Cache OpenHarmony native NDK
        id: ndk-cache
        uses: actions/cache@v4
        with:
          path: ~/ohos-ndk
          key: ohos-ndk-${{ env.OHOS_SDK_VERSION }}

      - name: Download OpenHarmony native NDK
        if: steps.ndk-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          echo "Downloading $OHOS_SDK_URL"
          curl -fSL --retry 3 "$OHOS_SDK_URL" -o /tmp/ohos-sdk.tar.gz
          EXPECTED=$(curl -fsSL "${OHOS_SDK_URL}.sha256" | awk '{print $1}')
          echo "${EXPECTED}  /tmp/ohos-sdk.tar.gz" | sha256sum -c -
          mkdir -p /tmp/ohos-sdk-x
          tar -xzf /tmp/ohos-sdk.tar.gz -C /tmp/ohos-sdk-x
          LINUX_DIR=$(find /tmp/ohos-sdk-x -maxdepth 2 -type d -name linux | head -1)
          [ -n "$LINUX_DIR" ] || { echo "linux/ not found in SDK tarball"; find /tmp/ohos-sdk-x -maxdepth 2 -type d; exit 1; }
          ( cd "$LINUX_DIR" && unzip -q -o 'native-linux-x64-*.zip' )
          mkdir -p ~/ohos-ndk
          cp -a "$LINUX_DIR/native" ~/ohos-ndk/native
          rm -rf /tmp/ohos-sdk.tar.gz /tmp/ohos-sdk-x

      - name: Expose OHOS NDK
        run: |
          set -euo pipefail
          NDK=$(cd ~/ohos-ndk && pwd)
          [ -d "$NDK/native" ] || { echo "native/ missing under $NDK"; ls -la "$NDK" || true; exit 1; }
          echo "OHOS_NDK_HOME=$NDK" >> "$GITHUB_ENV"
          echo "OHOS_NDK_HOME=$NDK"
          # libavtranscoder confirms a media-complete NDK (was an earlier failure).
          find "$NDK/native" -name 'libavtranscoder*' | head -1 || true

      # Gen the gitignored harmony SDK resources + sync WebViewCore.ets so the
      # harmony project tree matches a normal build.
      - uses: ./.github/actions/bootstrap-harmony-sdk

      - name: Build Harmony example (native only)
        working-directory: examples
        run: cargo run -p lingxia-cli -- build --platform harmony --framework react --native-only

      - name: Upload native library
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: example-harmony-libs
          path: examples/harmony/.lingxia/**/libs/**/*.so
          if-no-files-found: warn
