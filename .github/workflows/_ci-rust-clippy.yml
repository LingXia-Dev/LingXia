# Reusable workflow for Rust clippy checks
# Called by ci.yml
#
# Toolchain is pinned (not `stable`) so `-D warnings` is reproducible — a new
# stable clippy can't break CI with newly-added lints. Bump deliberately.

name: Internal / Rust Clippy

on:
  workflow_call:

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.95.0"
  ZIG_VERSION: "0.15.2"

jobs:
  # Runs on macOS for the same reason as the workspace check — the runtime
  # crates only build for android / apple / ohos, not a plain-linux host.
  # Advisory (wired in ci.yml outside the ci-success gate): the runtime crates
  # carry ~12 pre-existing clippy lints (collapsible_if, explicit_auto_deref,
  # …) to clean up before this can gate.
  clippy:
    name: Clippy
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy

      - uses: Swatinem/rust-cache@v2

      # lingxia-terminal builds ghostty's libghostty-vt with zig.
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      # lingxia-cli build.rs embeds the bridge/polyfills JS runtime.
      - uses: ./.github/actions/build-web-runtime

      # let_underscore_future is allowed workspace-wide: the runtime spawns many
      # detached background tasks (`let _ = executor.spawn(..)`) where dropping
      # the join handle is intentional fire-and-forget, not a dropped future.
      - name: Clippy (all workspace crates)
        run: cargo clippy --workspace -- -D warnings -A clippy::let_underscore_future
