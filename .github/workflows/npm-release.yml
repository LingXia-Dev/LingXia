# INTERNAL executor — dispatched automatically by "Release / 2. Publish
# Component". Do not run directly except to debug with dry_run; the normal
# release path is: Release / 1 (version PR) -> merge -> Release / 2.
name: Release Executor / NPM (internal)
run-name: NPM ${{ github.event_name == 'workflow_dispatch' && format('{0} v{1}', inputs.package, inputs.version) || github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Package to publish"
        required: true
        type: choice
        options:
          - all
          - lingxia-bridge
          - lingxia-elements
          - lingxia-html
          - lingxia-page-runtime
          - lingxia-polyfills
          - lingxia-react
          - lingxia-skill
          - lingxia-types
          - lingxia-vue
      version:
        description: "Version to publish (e.g. 0.1.0)"
        required: true
        type: string
      dry_run:
        description: "Dry run (skip actual publish)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.package || github.ref_name }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  NPM_PACKAGES: >-
    lingxia-bridge
    lingxia-polyfills
    lingxia-elements
    lingxia-page-runtime
    lingxia-html
    lingxia-react
    lingxia-vue
    lingxia-types
    lingxia-skill

jobs:
  # Footgun guard: this executor is dispatched by "Release / 2. Publish
  # Component" (which runs it as github-actions[bot]). Block humans from running
  # it by hand with a real publish, which would skip Release / 2's ordering and
  # version-in-code checks. Manual dry_run=true is allowed for debugging.
  guard:
    name: Guard manual dispatch
    runs-on: ubuntu-latest
    steps:
      - name: Reject manual non-dry-run runs
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          ACTOR: ${{ github.triggering_actor }}
        run: |
          set -euo pipefail
          if [[ "$DRY_RUN" == "true" ]]; then
            echo "Dry run — manual dispatch allowed."
            exit 0
          fi
          if [[ "$ACTOR" == "github-actions[bot]" ]]; then
            echo "Dispatched by Release / 2. Publish Component — allowed."
            exit 0
          fi
          echo "::error::Internal release executor — do not run it by hand."
          echo "::error::Use 'Release / 2. Publish Component' for a real release, or set dry_run=true to debug. (triggering_actor=$ACTOR)"
          exit 1

  determine-package:
    name: Determine Package
    needs: guard
    runs-on: ubuntu-latest
    outputs:
      package: ${{ steps.resolve.outputs.package }}
      package_set: ${{ steps.resolve.outputs.package_set }}
      version: ${{ steps.resolve.outputs.version }}
      directory: ${{ steps.resolve.outputs.directory }}
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Resolve package and version
        id: resolve
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            package="${{ inputs.package }}"
            version="${{ inputs.version }}"
          else
            tag="${{ github.ref_name }}"
            case "$tag" in
              lingxia-bridge-v*) package="lingxia-bridge"; version="${tag#lingxia-bridge-v}" ;;
              lingxia-elements-v*) package="lingxia-elements"; version="${tag#lingxia-elements-v}" ;;
              lingxia-html-v*) package="lingxia-html"; version="${tag#lingxia-html-v}" ;;
              lingxia-page-runtime-v*) package="lingxia-page-runtime"; version="${tag#lingxia-page-runtime-v}" ;;
              lingxia-polyfills-v*) package="lingxia-polyfills"; version="${tag#lingxia-polyfills-v}" ;;
              lingxia-react-v*) package="lingxia-react"; version="${tag#lingxia-react-v}" ;;
              lingxia-skill-v*) package="lingxia-skill"; version="${tag#lingxia-skill-v}" ;;
              lingxia-types-v*) package="lingxia-types"; version="${tag#lingxia-types-v}" ;;
              lingxia-vue-v*) package="lingxia-vue"; version="${tag#lingxia-vue-v}" ;;
              *) echo "Unknown tag format: $tag" >&2; exit 1 ;;
            esac
          fi

          # Map package to its source directory under packages/.
          case "$package" in
            all)
              directory="packages"
              package_set="all"
              ;;
            lingxia-bridge|lingxia-elements|lingxia-html|lingxia-page-runtime|lingxia-polyfills|lingxia-react|lingxia-skill|lingxia-types|lingxia-vue)
              directory="packages/$package"
              package_set="${package#lingxia-}"
              ;;
            *) echo "Unknown package: $package" >&2; exit 1 ;;
          esac

          {
            echo "package=$package"
            echo "package_set=$package_set"
            echo "version=$version"
            echo "directory=$directory"
            echo "tag=${package}-v${version}"
          } >> "$GITHUB_OUTPUT"
          echo "Publishing $package@$version from $directory"

  publish:
    name: Publish ${{ needs.determine-package.outputs.package }}
    needs: determine-package
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Resolve checkout ref
        id: checkout-ref
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          EVENT_NAME: ${{ github.event_name }}
          PACKAGE: ${{ needs.determine-package.outputs.package }}
          REF_NAME: ${{ github.ref_name }}
          TAG: ${{ needs.determine-package.outputs.tag }}
          VERSION: ${{ needs.determine-package.outputs.version }}
        run: |
          set -euo pipefail

          ref="$REF_NAME"
          if [[ "$EVENT_NAME" == "workflow_dispatch" && "$DRY_RUN" != "true" ]]; then
            if [[ "$PACKAGE" == "all" ]]; then
              ref="lingxia-bridge-v$VERSION"
            else
              ref="$TAG"
            fi
          fi

          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "Checkout ref: $ref"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ steps.checkout-ref.outputs.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"

      - name: Use npm 11
        run: npm install -g npm@11

      - name: Verify npm trusted publishing environment
        if: github.event_name != 'workflow_dispatch' || !inputs.dry_run
        run: |
          set -euo pipefail

          npm ping --registry=https://registry.npmjs.org
          NPM_VERSION="$(npm --version)"
          echo "npm $NPM_VERSION"

          NPM_VERSION="$NPM_VERSION" node <<'NODE'
          const version = process.env.NPM_VERSION ?? "";
          const [major, minor, patch] = version.split(".").map(Number);
          if (
            !Number.isFinite(major) ||
            major < 11 ||
            (major === 11 && (minor < 5 || (minor === 5 && patch < 1)))
          ) {
            console.error(`npm ${version} is too old for trusted publishing; need >= 11.5.1`);
            process.exit(1);
          }
          NODE

          if [[ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" || -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]]; then
            echo "::error::GitHub OIDC token request environment is missing. Check id-token: write permissions."
            exit 1
          fi

          echo "npm trusted publishing environment verified"

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ needs.determine-package.outputs.package }}-${{ needs.determine-package.outputs.version }}-${{ hashFiles('packages/*/package.json') }}
          restore-keys: npm-${{ needs.determine-package.outputs.package }}-

      - name: Verify version matches package.json
        run: |
          expected="${{ needs.determine-package.outputs.version }}"

          verify_package() {
            local package_json="$1"
            local actual
            actual="$(node -p "require('./$package_json').version")"
            if [ "$expected" != "$actual" ]; then
              echo "Version mismatch: expected $expected, got $actual in $package_json" >&2
              exit 1
            fi
            echo "Version verified: $package_json -> $actual"
          }

          if [ "${{ needs.determine-package.outputs.package }}" = "all" ]; then
            for package in $NPM_PACKAGES; do
              verify_package "packages/$package/package.json"
            done
          else
            verify_package "${{ needs.determine-package.outputs.directory }}/package.json"
          fi

      - name: Verify release tag exists
        if: github.event_name != 'workflow_dispatch' || !inputs.dry_run
        run: |
          set -euo pipefail

          git fetch --tags origin

          verify_tag() {
            local tag="$1"
            if ! git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
              echo "Missing release tag: $tag" >&2
              exit 1
            fi
            echo "Tag verified: $tag"
          }

          if [ "${{ needs.determine-package.outputs.package }}" = "all" ]; then
            for package in $NPM_PACKAGES; do
              verify_tag "${package}-v${{ needs.determine-package.outputs.version }}"
            done
          else
            verify_tag "${{ needs.determine-package.outputs.tag }}"
          fi

      - name: Publish (dry run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        run: bash scripts/release/npm.sh --package "${{ needs.determine-package.outputs.package_set }}" --dry-run

      - name: Publish
        if: github.event_name != 'workflow_dispatch' || !inputs.dry_run
        run: bash scripts/release/npm.sh --package "${{ needs.determine-package.outputs.package_set }}" --publish
