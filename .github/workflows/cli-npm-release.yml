name: CLI NPM Release

on:
  push:
    tags:
      - "lingxia-cli-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. lingxia-cli-v0.1.0)"
        required: true
        type: string
      dry_run:
        description: "Dry run (build only, skip publish)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # Linux cross-compile for Linux + macOS (saves macOS runner minutes - 10x cost!)
  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            target: x86_64-unknown-linux-gnu
            cross: false
          - platform: linux-arm64
            target: aarch64-unknown-linux-gnu
            cross: true
          - platform: darwin-x64
            target: x86_64-apple-darwin
            cross: true
          - platform: darwin-arm64
            target: aarch64-apple-darwin
            cross: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: cli-${{ matrix.platform }}

      - name: Install cargo-zigbuild
        if: matrix.cross
        run: pip install cargo-zigbuild

      - name: Install cross-compile dependencies (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Verify tag matches workspace version
        run: |
          tag="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          expected="${tag#lingxia-cli-v}"
          workspace_version="$(awk '
            /^\[workspace\.package\]/ {in_section=1; next}
            /^\[/ {in_section=0}
            in_section && $1 == "version" {
              gsub(/"/, "", $3);
              print $3;
              exit
            }' Cargo.toml)"
          if [ -z "$workspace_version" ]; then
            echo "Failed to read workspace version from Cargo.toml" >&2
            exit 1
          fi
          if [ "$expected" != "$workspace_version" ]; then
            echo "Tag version ($expected) does not match workspace version ($workspace_version)" >&2
            exit 1
          fi
          echo "Version verified: $workspace_version"

      - name: Run tests
        if: matrix.platform == 'linux-x64'
        run: cargo test -p lingxia-cli

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build -p lingxia-cli --release --target ${{ matrix.target }}

      - name: Build (cross-compile with zigbuild)
        if: matrix.cross
        run: cargo zigbuild -p lingxia-cli --release --target ${{ matrix.target }}

      - name: Collect binary
        run: |
          mkdir -p out
          cp target/${{ matrix.target }}/release/lingxia out/lingxia

      - uses: actions/upload-artifact@v4
        with:
          name: lingxia-${{ matrix.platform }}
          path: out/*
          if-no-files-found: error

  publish:
    needs: [build-linux]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare GitHub Release assets
        run: |
          tag="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          version="${tag#lingxia-cli-v}"

          node tools/lingxia-cli/npm/scripts/set-version.cjs "$version"
          mkdir -p release-assets
          cp artifacts/lingxia-darwin-arm64/lingxia release-assets/lingxia-darwin-arm64
          cp artifacts/lingxia-darwin-x64/lingxia release-assets/lingxia-darwin-x64
          cp artifacts/lingxia-linux-x64/lingxia release-assets/lingxia-linux-x64
          cp artifacts/lingxia-linux-arm64/lingxia release-assets/lingxia-linux-arm64

      - name: Prepare platform npm packages
        run: |
          set -euo pipefail
          tag="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          version="${tag#lingxia-cli-v}"

          mkdir -p platform-packages

          create_pkg() {
            platform="$1"
            pkg_name="$2"
            os_name="$3"
            cpu_name="$4"
            artifact_path="$5"
            bin_name="$6"

            pkg_dir="platform-packages/$platform"
            mkdir -p "$pkg_dir/bin"
            cp "$artifact_path" "$pkg_dir/bin/$bin_name"
            chmod +x "$pkg_dir/bin/$bin_name"

            cat > "$pkg_dir/package.json" <<EOF
          {
            "name": "$pkg_name",
            "version": "$version",
            "os": ["$os_name"],
            "cpu": ["$cpu_name"],
            "files": ["bin/$bin_name"],
            "license": "MIT"
          }
          EOF
          }

          create_pkg "darwin-arm64" "@lingxia/cli-darwin-arm64" "darwin" "arm64" "artifacts/lingxia-darwin-arm64/lingxia" "lingxia"
          create_pkg "darwin-x64" "@lingxia/cli-darwin-x64" "darwin" "x64" "artifacts/lingxia-darwin-x64/lingxia" "lingxia"

      - name: Install CLI npm dependencies
        working-directory: tools/lingxia-cli/npm
        env:
          LINGXIA_CLI_SKIP_DOWNLOAD: "1"
        run: npm install

      - name: Dry run summary
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        run: |
          echo "DRY RUN - would publish:"
          echo "  - GitHub Release assets:"
          ls -la release-assets/
          echo "  - Platform npm packages:"
          for platform in darwin-arm64 darwin-x64; do
            echo "    * @lingxia/cli-$platform"
            (cd "platform-packages/$platform" && npm pack --dry-run)
          done
          echo "  - NPM package: @lingxia/cli"
          (cd tools/lingxia-cli/npm && npm pack --dry-run)

      - name: Upload binaries to GitHub Release
        if: github.event_name != 'workflow_dispatch' || !inputs.dry_run
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: |
            release-assets/lingxia-darwin-arm64
            release-assets/lingxia-darwin-x64
            release-assets/lingxia-linux-x64
            release-assets/lingxia-linux-arm64

      - name: Publish platform packages
        if: github.event_name != 'workflow_dispatch' || !inputs.dry_run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          version="${tag#lingxia-cli-v}"

          for platform in darwin-arm64 darwin-x64; do
            pkg="@lingxia/cli-$platform"
            pkg_dir="platform-packages/$platform"
            if npm view "$pkg@$version" version >/dev/null 2>&1; then
              echo "✓ $pkg@$version already published, skipping"
            else
              (cd "$pkg_dir" && npm publish --access public)
              echo "✓ Published $pkg@$version"
            fi
          done

      - name: Wait for platform package availability
        if: github.event_name != 'workflow_dispatch' || !inputs.dry_run
        run: |
          set -euo pipefail
          tag="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          version="${tag#lingxia-cli-v}"

          for platform in darwin-arm64 darwin-x64; do
            pkg="@lingxia/cli-$platform"
            available=0
            for attempt in {1..12}; do
              if npm view "$pkg@$version" version >/dev/null 2>&1; then
                echo "✓ $pkg@$version is available"
                available=1
                break
              fi
              echo "Waiting for npm to index $pkg@$version (attempt $attempt/12)..."
              sleep 5
            done
            if [ "$available" -ne 1 ]; then
              echo "ERROR: $pkg@$version is not available yet, aborting wrapper publish." >&2
              exit 1
            fi
          done

      - name: Publish wrapper package
        if: github.event_name != 'workflow_dispatch' || !inputs.dry_run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          version="${tag#lingxia-cli-v}"
          if npm view "@lingxia/cli@$version" version >/dev/null 2>&1; then
            echo "✓ @lingxia/cli@$version already published, skipping"
          else
            (cd tools/lingxia-cli/npm && npm publish --access public)
            echo "✓ Published @lingxia/cli@$version"
          fi
