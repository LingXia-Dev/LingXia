# Reusable workflow: build the macOS-only LingXia Runner app.
# Called by ci.yml as a blocking gate (gated on apple SDK / rust changes).

name: Internal / Runner Build

on:
  workflow_call:

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.95.0"
  ZIG_VERSION: "0.15.2"

jobs:
  runner:
    name: runner-macos-arm64
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # Match the dev toolchain (Xcode 26 = Swift 6.2) used by the example apps.
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: runner-arm64

      # lingxia-terminal builds ghostty's libghostty-vt with zig.
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - uses: ./.github/actions/build-web-runtime

      # Generate the gitignored apple SDK assets (resources + swift bindings).
      - uses: ./.github/actions/bootstrap-apple-sdk

      - name: Build macOS Runner (arm64)
        run: bash scripts/release/runner.sh --macos-arch arm64 --out dist/runner-release

      - name: Upload Runner zip
        uses: actions/upload-artifact@v4
        with:
          name: lingxia-runner-macos-arm64
          path: dist/runner-release/*.zip
          if-no-files-found: error
