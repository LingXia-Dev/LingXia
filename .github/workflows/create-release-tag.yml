name: Release / 2. Publish Component
run-name: Publish ${{ inputs.component == 'npm' && format('npm/{0}', inputs.npm_package) || inputs.component }} v${{ inputs.version }}

# Public release entrypoint. Run AFTER the unified version bump PR has merged
# to main. This workflow creates the release tag(s), then explicitly dispatches
# and waits for the matching executor workflow. We do not rely on tag-push
# fanout here because tags pushed with GITHUB_TOKEN do not reliably trigger
# downstream workflows.

on:
  workflow_dispatch:
    inputs:
      component:
        description: "High-level component to publish"
        required: true
        type: choice
        options:
          - crates
          - sdk
          - cli
          - npm
      npm_package:
        description: "NPM package when component=npm"
        required: false
        default: all
        type: choice
        options:
          - all
          - lingxia-bridge
          - lingxia-elements
          - lingxia-html
          - lingxia-page-runtime
          - lingxia-polyfills
          - lingxia-react
          - lingxia-skill
          - lingxia-types
          - lingxia-vue
      version:
        description: "Version to publish (e.g. 0.9.0)"
        required: true
        type: string

permissions:
  actions: write
  contents: write
  id-token: write

env:
  NPM_PACKAGES: >-
    lingxia-bridge
    lingxia-polyfills
    lingxia-elements
    lingxia-page-runtime
    lingxia-html
    lingxia-react
    lingxia-vue
    lingxia-types
    lingxia-skill

jobs:
  publish:
    name: Dispatch ${{ inputs.component == 'npm' && format('npm/{0}', inputs.npm_package) || inputs.component }} v${{ inputs.version }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Validate inputs
        env:
          COMPONENT: ${{ inputs.component }}
          NPM_PACKAGE: ${{ inputs.npm_package }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version: $VERSION (expected x.y.z)" >&2
            exit 1
          fi

          case "$COMPONENT" in
            crates|sdk|cli|npm) ;;
            *) echo "Unknown component: $COMPONENT" >&2; exit 1 ;;
          esac

          if [[ "$COMPONENT" == "npm" && "$NPM_PACKAGE" != "all" ]]; then
            found=0
            for package in $NPM_PACKAGES; do
              [[ "$package" == "$NPM_PACKAGE" ]] && found=1
            done
            if [[ "$found" -ne 1 ]]; then
              echo "Unknown npm package: $NPM_PACKAGE" >&2
              exit 1
            fi
          fi

      - name: Verify version in code
        env:
          COMPONENT: ${{ inputs.component }}
          NPM_PACKAGE: ${{ inputs.npm_package }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          verify_workspace_version() {
            local actual
            actual="$(awk '/^\[workspace\.package\]/{f=1} f && /^version/{gsub(/"/, "", $3); print $3; exit}' Cargo.toml)"
            if [[ "$actual" != "$VERSION" ]]; then
              echo "Version mismatch: expected $VERSION, found $actual in Cargo.toml" >&2
              echo "Did you merge the release PR first?" >&2
              exit 1
            fi
            echo "Workspace version verified: $actual"
          }

          verify_cli_version() {
            local actual
            actual="$(awk '/^\[package\]/{f=1} f && /^version/{gsub(/"/, "", $3); print $3; exit}' tools/lingxia-cli/Cargo.toml)"
            if [[ "$actual" != "$VERSION" ]]; then
              echo "Version mismatch: expected $VERSION, found $actual in tools/lingxia-cli/Cargo.toml" >&2
              echo "Did you merge the CLI release PR first?" >&2
              exit 1
            fi
            echo "lingxia-cli version verified: $actual"
          }

          # bridge/polyfills/types track the workspace version in lockstep; every
          # other npm package is framework/tools and may stay at an older version
          # when version.sh skipped its bump (unchanged since its last tag).
          is_base_npm() {
            case " lingxia-bridge lingxia-polyfills lingxia-types " in
              *" $1 "*) return 0 ;;
            esac
            return 1
          }

          read_npm_package_version() {
            local package="$1"
            local package_json="packages/$package/package.json"
            if [[ ! -f "$package_json" ]]; then
              echo "Missing package.json: $package_json" >&2
              exit 1
            fi
            node -p "require('./$package_json').version"
          }

          # Base packages must equal $VERSION (this is the "did you merge the
          # version PR?" guard); framework packages are verified at their own
          # version since they legitimately drift behind the workspace.
          verify_npm_package_version() {
            local package="$1"
            local actual
            actual="$(read_npm_package_version "$package")"
            if is_base_npm "$package" && [[ "$actual" != "$VERSION" ]]; then
              echo "Version mismatch: expected $VERSION, found $actual in packages/$package/package.json" >&2
              echo "Did you merge the release PR first?" >&2
              exit 1
            fi
            echo "$package version verified: $actual"
          }

          case "$COMPONENT" in
            crates|sdk)
              verify_workspace_version
              ;;
            cli)
              verify_cli_version
              ;;
            npm)
              if [[ "$NPM_PACKAGE" == "all" ]]; then
                for package in $NPM_PACKAGES; do
                  verify_npm_package_version "$package"
                done
              else
                # A single-package dispatch always bumps that package to $VERSION.
                actual="$(read_npm_package_version "$NPM_PACKAGE")"
                if [[ "$actual" != "$VERSION" ]]; then
                  echo "Version mismatch: expected $VERSION, found $actual in packages/$NPM_PACKAGE/package.json" >&2
                  echo "Did you merge the release PR first?" >&2
                  exit 1
                fi
                echo "$NPM_PACKAGE version verified: $actual"
              fi
              ;;
          esac

      - name: Create tag(s) and dispatch executor
        env:
          COMPONENT: ${{ inputs.component }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_PACKAGE: ${{ inputs.npm_package }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          create_or_reuse_tag() {
            local tag="$1"
            local message="$2"

            local remote_ref
            if remote_ref="$(git ls-remote --tags origin "refs/tags/$tag" "refs/tags/$tag^{}" 2>/dev/null)" && [[ -n "$remote_ref" ]]; then
              # Reuse is only safe if the existing tag points at the commit we
              # just verified ($GITHUB_SHA). A stale tag from a failed run could
              # otherwise publish from the wrong source. Prefer the peeled (^{})
              # line for annotated tags; fall back to the bare ref otherwise.
              local remote_commit
              remote_commit="$(printf '%s\n' "$remote_ref" | awk '/\^\{\}$/{c=$1} END{if(c)print c}')"
              [[ -z "$remote_commit" ]] && remote_commit="$(printf '%s\n' "$remote_ref" | awk 'NR==1{print $1}')"
              if [[ -n "$remote_commit" && "$remote_commit" != "$GITHUB_SHA" ]]; then
                echo "Tag $tag already exists on origin at $remote_commit, but this run is at $GITHUB_SHA." >&2
                echo "Refusing to publish from a tag that points at a different commit." >&2
                exit 1
              fi
              echo "Tag already exists on origin at the current commit, reusing: $tag"
              return 0
            fi

            if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
              echo "Tag exists locally but not on origin: $tag" >&2
              exit 1
            fi

            git tag -a "$tag" -m "$message"
            git push origin "$tag"
            echo "Created and pushed tag: $tag"
          }

          dispatch_and_wait() {
            local workflow="$1"
            local label="$2"
            shift 2

            local dispatch_after
            local output
            local run_id
            local run_url
            dispatch_after="$(date -u +%s)"

            echo "Dispatching $label..."
            output="$(gh workflow run "$workflow" --ref main "$@")"
            printf '%s\n' "$output"

            run_url="$(printf '%s\n' "$output" | awk '/actions\/runs\// {print $0; exit}')"
            run_id="${run_url##*/}"

            if ! [[ "$run_id" =~ ^[0-9]+$ ]]; then
              run_id=""
              echo "Waiting for GitHub to create the $label run..."
              for _ in {1..30}; do
                run_id="$(gh run list \
                  --workflow "$workflow" \
                  --event workflow_dispatch \
                  --limit 20 \
                  --json databaseId,createdAt,headSha \
                  | jq -r \
                    --arg sha "$GITHUB_SHA" \
                    --argjson earliest "$((dispatch_after - 5))" \
                    '[.[] | select(.headSha == $sha) | select((.createdAt | fromdateiso8601) >= $earliest)] | sort_by(.createdAt) | reverse | .[0].databaseId // empty')"
                [[ -n "$run_id" ]] && break
                sleep 2
              done
            fi

            if [[ -z "$run_id" ]]; then
              echo "Failed to find dispatched $label run" >&2
              exit 1
            fi

            if [[ -z "$run_url" ]]; then
              run_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${run_id}"
            fi

            {
              echo "### $label"
              echo ""
              echo "- Executor run: $run_url"
            } >> "$GITHUB_STEP_SUMMARY"

            echo "Watching $label: $run_url"
            set +e
            gh run watch "$run_id" --interval 15 --exit-status
            local watch_status="$?"
            set -e

            {
              echo ""
              echo "#### Executor jobs"
              gh run view "$run_id" --json jobs --jq '.jobs[] | "- " + .name + ": " + ((.conclusion // .status) // "unknown")'
            } >> "$GITHUB_STEP_SUMMARY"

            return "$watch_status"
          }

          publish_crates() {
            local tag="lingxia-crates-v$VERSION"
            create_or_reuse_tag "$tag" "Release crates v$VERSION"
            dispatch_and_wait "crates-release.yml" "Crates v$VERSION" -f tag="$tag" -f dry_run=false
          }

          publish_sdk() {
            local tag="lingxia-sdk-v$VERSION"
            create_or_reuse_tag "$tag" "Release sdk v$VERSION"
            dispatch_and_wait "sdk-release.yml" "SDK v$VERSION" \
              -f tag="$tag" \
              -f android=true \
              -f apple=true \
              -f harmony=false \
              -f dry_run=false
          }

          publish_cli() {
            local tag="lingxia-cli-v$VERSION"
            create_or_reuse_tag "$tag" "Release cli v$VERSION"
            dispatch_and_wait "release-cli.yml" "CLI v$VERSION" -f tag="$tag" -f dry_run=false
          }

          publish_npm_package() {
            local package="$1"
            local tag="${package}-v$VERSION"
            create_or_reuse_tag "$tag" "Release $package v$VERSION"
            dispatch_and_wait "npm-release.yml" "NPM $package v$VERSION" \
              -f package="$package" \
              -f version="$VERSION" \
              -f dry_run=false
          }

          publish_all_npm_packages() {
            # Base-runtime packages bump in lockstep with $VERSION; framework/tool
            # packages may stay at an older version when unchanged (version.sh
            # skips their bump). Tag each at its actual package.json version so the
            # tag never claims a version the package was not published at.
            for package in $NPM_PACKAGES; do
              local pkg_version
              pkg_version="$(node -p "require('./packages/${package}/package.json').version")"
              local tag="${package}-v${pkg_version}"
              create_or_reuse_tag "$tag" "Release $package v${pkg_version}"
            done

            dispatch_and_wait "npm-release.yml" "NPM all v$VERSION" \
              -f package=all \
              -f version="$VERSION" \
              -f dry_run=false
          }

          case "$COMPONENT" in
            crates)
              publish_crates
              ;;
            sdk)
              publish_sdk
              ;;
            cli)
              publish_cli
              ;;
            npm)
              if [[ "$NPM_PACKAGE" == "all" ]]; then
                publish_all_npm_packages
              else
                publish_npm_package "$NPM_PACKAGE"
              fi
              ;;
          esac
