name: Release / 1. Prepare Version PR
run-name: Prepare ${{ inputs.component }} v${{ inputs.version }}

# Version bump PR helper. `component=all` applies ONE version to the whole
# workspace/package set via scripts/release/version.sh. `component=cli` bumps
# only tools/lingxia-cli so the CLI can ship patch releases independently.
# `component=npm:<package>` bumps a single framework/tool npm package for patch
# drift within the lockstep major.minor line (internal @lingxia/* deps are caret
# ranges). Base-runtime npm (bridge/polyfills/types) are NOT listed here — they
# are embedded as app assets / locked to the workspace and ship via component=all.
#
# After this PR merges, publish from the "Release / 2. Publish Component"
# workflow for the matching component/version.

on:
  workflow_dispatch:
    inputs:
      component:
        description: "Version scope"
        required: true
        default: all
        type: choice
        options:
          - all
          - cli
          - npm:elements
          - npm:html
          - npm:page-runtime
          - npm:react
          - npm:skill
          - npm:vue
      version:
        description: "Version to release (e.g. 0.5.0)"
        required: true
        type: string

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write

jobs:
  prepare:
    name: Prepare ${{ inputs.component }} v${{ inputs.version }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Validate semver input
        run: |
          if ! [[ "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version: ${{ inputs.version }} (expected x.y.z)" >&2
            exit 1
          fi
          case "${{ inputs.component }}" in
            all|cli|npm:*) ;;
            *) echo "Invalid component: ${{ inputs.component }}" >&2; exit 1 ;;
          esac

      - name: Create release branch
        run: |
          set -euo pipefail
          if [[ "${{ inputs.component }}" == "all" ]]; then
            branch="release/v${{ inputs.version }}"
          else
            # ":" is not allowed in git ref names (npm:react -> npm-react)
            component_slug="$(echo "${{ inputs.component }}" | tr ':' '-')"
            branch="release/${component_slug}/v${{ inputs.version }}"
          fi
          remote_sha="$(git ls-remote --heads origin "$branch" | awk '{print $1}')"
          git checkout -B "$branch"
          echo "BRANCH=$branch" >> "$GITHUB_ENV"
          echo "REMOTE_BRANCH_SHA=$remote_sha" >> "$GITHUB_ENV"

      - name: Bump version
        run: |
          bash scripts/release/version.sh "${{ inputs.version }}" --component "${{ inputs.component }}"

      - name: Commit version bump
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No version changes to commit. The selected component already appears to be at ${{ inputs.version }}." >&2
            exit 1
          fi
          git commit -am "chore(release): bump ${{ inputs.component }} version to ${{ inputs.version }}"

      - name: Push branch
        run: |
          set -euo pipefail
          if [[ -n "$REMOTE_BRANCH_SHA" ]]; then
            git push --force-with-lease="refs/heads/$BRANCH:$REMOTE_BRANCH_SHA" -u origin "$BRANCH"
          else
            git push -u origin "$BRANCH"
          fi

      - name: Ensure release label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create release \
            --color "0E8A16" \
            --description "Release preparation and publishing" \
            2>/dev/null || \
          gh label edit release \
            --color "0E8A16" \
            --description "Release preparation and publishing"

      - name: Create Pull Request
        id: create-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          component="${{ inputs.component }}"
          if [[ "$component" == "all" ]]; then
            pr_title="Release v${version}"
            pr_body="$(cat <<EOF
          ## Release v${version}

          Unified version bump to \`${version}\` applied via
          \`scripts/release/version.sh\`. This rewrites the version in one shot:

          - \`Cargo.toml\` \`workspace.package.version\` + workspace crate dep versions
          - \`tools/lingxia-cli/Cargo.toml\`: embedded component versions track the
            workspace; the CLI \`[package]\` version advances on its **own** patch
            line (workspace major.minor + next CLI patch), so check the file for
            the resulting CLI version.
          - every \`packages/*/package.json\` version — except framework/tool
            packages unchanged since their last tag, which keep their version and
            are not republished. Internal \`@lingxia/*\` dep ranges stay caret.

          ### After merge

          This bump does not publish anything on its own. Publish from the
          **Release / 2. Publish Component** workflow after this PR merges:

          \`\`\`bash
          # Recommended order:
          # 1. component=crates, version=${version}
          # 2. component=sdk,    version=${version}
          # 3. component=cli,    version=<CLI version from tools/lingxia-cli/Cargo.toml>
          # 4. component=npm,    npm_package=all, version=${version}
          \`\`\`
          EOF
          )"
          elif [[ "$component" == npm:* ]]; then
            package="${component#npm:}"
            pr_title="Release @lingxia/${package} v${version}"
            pr_body="$(cat <<EOF
          ## NPM Release @lingxia/${package} v${version}

          Single-package version bump to \`${version}\` applied via:

          \`\`\`bash
          scripts/release/version.sh ${version} --component npm:${package}
          \`\`\`

          Internal \`@lingxia/*\` dependency ranges are caret ranges, so this
          patch stays inside the range sibling packages already accept. Other
          packages, workspace crates, SDK artifacts, and the CLI stay on their
          existing versions.

          ### After merge

          Publish from **Release / 2. Publish Component**:

          \`\`\`bash
          component=npm, npm_package=lingxia-${package}, version=${version}
          \`\`\`
          EOF
          )"
          else
            pr_title="Release CLI v${version}"
            pr_body="$(cat <<EOF
          ## CLI Release v${version}

          CLI-only version bump to \`${version}\` applied via:

          \`\`\`bash
          scripts/release/version.sh ${version} --component cli
          \`\`\`

          This only allows changes to \`tools/lingxia-cli/Cargo.toml\` and,
          when Cargo needs metadata synchronization, the root \`Cargo.lock\`.
          Workspace crates, SDK artifacts, and npm packages stay on their
          existing versions.

          ### After merge

          Publish from **Release / 2. Publish Component**:

          \`\`\`bash
          component=cli, version=${version}
          \`\`\`
          EOF
          )"
          fi

          existing_pr="$(gh pr list --base main --head "$BRANCH" --state open --json url --jq '.[0].url')"
          if [ -n "$existing_pr" ]; then
            pr_url="$existing_pr"
            echo "Release PR already exists: $pr_url"
          else
            pr_url="$(gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "$pr_title" \
              --body "$pr_body" \
              --label "release")"
          fi

          echo "PR_URL=$pr_url" >> "$GITHUB_ENV"
          echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"
          {
            echo "### Release PR"
            echo ""
            echo "- Branch: \`$BRANCH\`"
            echo "- Pull request: $pr_url"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Dispatch CI for release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          head_sha="$(git rev-parse HEAD)"
          dispatch_after="$(date -u +%s)"

          gh workflow run ci.yml --ref "$BRANCH"

          run_id=""
          for _ in {1..30}; do
            run_id="$(gh run list \
              --workflow ci.yml \
              --branch "$BRANCH" \
              --event workflow_dispatch \
              --limit 20 \
              --json databaseId,createdAt,headSha \
              | jq -r \
                --arg sha "$head_sha" \
                --argjson earliest "$((dispatch_after - 5))" \
                '[.[] | select(.headSha == $sha) | select((.createdAt | fromdateiso8601) >= $earliest)] | sort_by(.createdAt) | reverse | .[0].databaseId // empty')"
            [[ -n "$run_id" ]] && break
            sleep 2
          done

          if [[ -z "$run_id" ]]; then
            echo "Failed to find dispatched CI run for $BRANCH" >&2
            exit 1
          fi

          run_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${run_id}"
          {
            echo ""
            echo "### CI"
            echo ""
            echo "- Run: $run_url"
          } >> "$GITHUB_STEP_SUMMARY"

          gh run watch "$run_id" --interval 15 --exit-status
