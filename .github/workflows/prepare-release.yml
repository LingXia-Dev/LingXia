name: Release / 1. Prepare Version PR
run-name: Prepare release v${{ inputs.version }}

# Unified version bump: applies ONE version to the whole workspace
# (Cargo.toml workspace.package + workspace deps, install.sh, every
# packages/* package.json + internal @lingxia/* dep ranges) via
# scripts/release/version.sh, then opens a Release PR.
#
# You do NOT pick a component here. After this PR merges, you choose what to
# publish by which per-component tags you push (Create Release Tag workflow,
# or `git tag lingxia-<component>-v<version>`).

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.5.0)"
        required: true
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  prepare:
    name: Prepare release v${{ inputs.version }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Validate semver input
        run: |
          if ! [[ "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version: ${{ inputs.version }} (expected x.y.z)" >&2
            exit 1
          fi

      - name: Create release branch
        run: |
          branch="release/v${{ inputs.version }}"
          if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
            git fetch origin "$branch"
            git checkout -B "$branch" "origin/$branch"
          else
            git checkout -b "$branch"
          fi
          echo "BRANCH=$branch" >> "$GITHUB_ENV"

      - name: Bump version (unified)
        run: |
          bash scripts/release/version.sh "${{ inputs.version }}"

      - name: Commit version bump
        run: |
          if git diff --quiet; then
            echo "No version changes to commit"
          else
            git commit -am "chore(release): bump version to ${{ inputs.version }}"
          fi

      - name: Push branch
        run: |
          git push -u origin "$BRANCH"

      - name: Ensure release label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create release \
            --color "0E8A16" \
            --description "Release preparation and publishing" \
            2>/dev/null || \
          gh label edit release \
            --color "0E8A16" \
            --description "Release preparation and publishing"

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ inputs.version }}"
          pr_body="$(cat <<EOF
          ## Release v${version}

          Unified version bump to \`${version}\` applied via
          \`scripts/release/version.sh\`. This rewrites the version in one shot:

          - \`Cargo.toml\` \`workspace.package.version\` + workspace crate dep versions
          - \`install.sh\` \`VERSION\`
          - every \`packages/*/package.json\` version + internal \`@lingxia/*\` dep ranges

          ### After merge

          This bump does not publish anything on its own. Publish from the
          **Release / 2. Publish Component** workflow after this PR merges:

          \`\`\`bash
          # Recommended order:
          # 1. component=crates, version=${version}
          # 2. component=sdk,    version=${version}
          # 3. component=cli,    version=${version}
          # 4. component=npm,    npm_package=all, version=${version}
          \`\`\`
          EOF
          )"

          existing_pr="$(gh pr list --base main --head "$BRANCH" --state open --json url --jq '.[0].url')"
          if [ -n "$existing_pr" ]; then
            echo "Release PR already exists: $existing_pr"
            exit 0
          fi

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Release v${version}" \
            --body "$pr_body" \
            --label "release"
