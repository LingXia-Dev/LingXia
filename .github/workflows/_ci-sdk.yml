# Reusable workflow for SDK platform build checks
# Called by ci.yml

name: CI - SDK

on:
  workflow_call:

env:
  NODE_VERSION: "20"

jobs:
  android:
    name: Android SDK Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-sdk-${{ hashFiles('lingxia-sdk/android/**/*.gradle*', 'lingxia-sdk/android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-sdk-

      - name: Build web runtime
        working-directory: packages/lingxia-core
        run: |
          if [[ -f package-lock.json ]]; then
            npm ci
          else
            npm install
          fi
          npm run build

      - name: Build Android SDK (assembleRelease)
        working-directory: lingxia-sdk/android
        run: ./gradlew :lingxia:assembleRelease --no-daemon

  ios:
    name: iOS SDK Swift Check
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Validate Package.swift
        working-directory: lingxia-sdk/apple
        run: |
          echo "Validating Swift Package..."
          swift package dump-package > /dev/null
          echo "✓ Package.swift is valid"

      - name: Check Swift compilation (resolve dependencies)
        working-directory: lingxia-sdk/apple
        run: |
          echo "Resolving Swift package dependencies..."
          swift package resolve
          echo "✓ Dependencies resolved"

          # Note: Full build requires Rust-generated bridge files which are
          # created during release. Here we only validate the package structure.
