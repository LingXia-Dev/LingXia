# Reusable workflow: build the `lingxia` CLI on every platform it ships for.
# Called by ci.yml as a blocking gate.
#
# Each target builds natively on its real OS (no cross-toolchains):
#   - linux-x64    ubuntu-latest        (native)
#   - linux-arm64  ubuntu-24.04-arm     (native, free public arm64 runner)
#   - darwin-arm64 macos-latest         (native)
#   - darwin-x64   macos-latest         (cross to x86_64 via the universal SDK)
#   - windows-x64  windows-latest       (native)
#
# The macOS Runner (an app build, not a CLI binary) lives in _ci-runner.yml.

name: Internal / CLI Build

on:
  workflow_call:

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.95.0"

jobs:
  cli:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            exe: ""
          - platform: linux-arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            exe: ""
          - platform: darwin-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            exe: ""
          - platform: darwin-x64
            os: macos-latest
            target: x86_64-apple-darwin
            exe: ""
          - platform: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            exe: ".exe"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: cli-${{ matrix.platform }}

      # lingxia-cli build.rs embeds the bridge/polyfills JS runtime.
      - uses: ./.github/actions/build-web-runtime

      - name: Build CLI (release)
        run: cargo build -p lingxia-cli --release --target ${{ matrix.target }}

      - name: Smoke test (--version)
        shell: bash
        run: ./target/${{ matrix.target }}/release/lingxia${{ matrix.exe }} --version

      - name: Upload CLI binary
        uses: actions/upload-artifact@v4
        with:
          name: lingxia-${{ matrix.platform }}
          path: target/${{ matrix.target }}/release/lingxia${{ matrix.exe }}
          if-no-files-found: error
