# INTERNAL executor — dispatched automatically by "Release / 2. Publish
# Component". Do not run directly except to debug with dry_run; the normal
# release path is: Release / 1 (version PR) -> merge -> Release / 2.
name: Release Executor / SDK (internal)
run-name: SDK ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload to (e.g. lingxia-sdk-v0.0.1)"
        required: true
        type: string
      android:
        description: "Build + upload Android artifact"
        required: false
        default: true
        type: boolean
      apple:
        description: "Build + upload Apple source artifact"
        required: false
        default: true
        type: boolean
      harmony:
        description: "Build + upload HarmonyOS artifact (requires self-hosted runner)"
        required: false
        default: false
        type: boolean
      dry_run:
        description: "Dry run (build artifacts, skip GitHub Release upload)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: true

env:
  RUST_TOOLCHAIN: "1.95.0"

jobs:
  # Footgun guard: this executor is dispatched by "Release / 2. Publish
  # Component" (which runs it as github-actions[bot]). Block humans from running
  # it by hand with a real publish, which would skip Release / 2's ordering and
  # version-in-code checks. Manual dry_run=true is allowed for debugging.
  guard:
    name: Guard manual dispatch
    runs-on: ubuntu-latest
    steps:
      - name: Reject manual non-dry-run runs
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          ACTOR: ${{ github.triggering_actor }}
        run: |
          set -euo pipefail
          if [[ "$DRY_RUN" == "true" ]]; then
            echo "Dry run — manual dispatch allowed."
            exit 0
          fi
          if [[ "$ACTOR" == "github-actions[bot]" ]]; then
            echo "Dispatched by Release / 2. Publish Component — allowed."
            exit 0
          fi
          echo "::error::Internal release executor — do not run it by hand."
          echo "::error::Use 'Release / 2. Publish Component' for a real release, or set dry_run=true to debug. (triggering_actor=$ACTOR)"
          exit 1

  # Pre-check job to verify version before any platform build uploads assets.
  pre-check:
    name: Release / Verify SDK tag
    needs: guard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.verify.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Verify tag matches workspace version
        id: verify
        run: |
          tag="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          expected="${tag#lingxia-sdk-v}"
          workspace_version="$(awk '
            /^\[workspace\.package\]/ {in_section=1; next}
            /^\[/ {in_section=0}
            in_section && $1 == "version" {
              gsub(/"/, "", $3);
              print $3;
              exit
            }' Cargo.toml)"
          if [ -z "$workspace_version" ]; then
            echo "Failed to read workspace version" >&2
            exit 1
          fi
          if [ "$expected" != "$workspace_version" ]; then
            echo "Tag version ($expected) does not match workspace version ($workspace_version)" >&2
            exit 1
          fi
          echo "Version verified: $workspace_version"
          echo "version=$workspace_version" >> "$GITHUB_OUTPUT"

  android:
    name: SDK / Android
    needs: pre-check
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.android)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: sdk-android

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - uses: ./.github/actions/build-web-runtime

      - name: Warm Gradle wrapper
        run: |
          set -euo pipefail

          # The wrapper distribution download can occasionally time out on
          # GitHub-hosted runners. Warm it separately with retry so the SDK
          # build itself does not leave a partial release.
          if ! grep -q '^networkTimeout=' lingxia-sdk/android/gradle/wrapper/gradle-wrapper.properties; then
            echo 'networkTimeout=120000' >> lingxia-sdk/android/gradle/wrapper/gradle-wrapper.properties
          fi

          for attempt in 1 2 3; do
            if (cd lingxia-sdk/android && ./gradlew --version --no-daemon); then
              exit 0
            fi
            sleep "$((attempt * 10))"
          done

          (cd lingxia-sdk/android && ./gradlew --version --no-daemon)

      - name: Build Android SDK artifact
        run: |
          bash scripts/release/sdk.sh --platform android

      - name: Upload Android SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-android
          path: |
            dist/sdk-release/lingxia-sdk-android-maven-*.zip
            dist/sdk-release/SHASUMS256-*-android.txt
          if-no-files-found: error

  apple:
    name: SDK / Apple
    needs: pre-check
    # Apple SDK source packaging requires macOS for swift-bridge code generation.
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.apple)
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: aarch64-apple-ios

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: sdk-apple

      - uses: ./.github/actions/build-web-runtime

      - name: Build Apple source SDK artifact
        run: |
          bash scripts/release/sdk.sh --platform apple

      - name: Upload Apple SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-apple
          path: |
            dist/sdk-release/lingxia-sdk-apple-source-*.zip
            dist/sdk-release/SHASUMS256-*-apple.txt
          if-no-files-found: error

  harmony:
    name: SDK / HarmonyOS
    needs: pre-check
    # HarmonyOS requires DevEco tooling (hvigorw) - only available on self-hosted runners
    # Only triggered via workflow_dispatch with harmony=true
    if: github.event_name == 'workflow_dispatch' && inputs.harmony
    runs-on: self-hosted
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: sdk-harmony

      - uses: ./.github/actions/build-web-runtime

      - name: Build HarmonyOS SDK artifact
        run: |
          bash scripts/release/sdk.sh --platform harmony

      - name: Upload HarmonyOS SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-harmony
          path: |
            dist/sdk-release/lingxia-sdk-harmony-*.har
            dist/sdk-release/SHASUMS256-*-harmony.txt
          if-no-files-found: error

  publish:
    name: Release / Publish SDK assets
    needs: [pre-check, android, apple, harmony]
    if: always() && needs.pre-check.result == 'success' && (github.event_name != 'workflow_dispatch' || !inputs.dry_run)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Verify selected SDK builds succeeded
        env:
          ANDROID_INPUT: ${{ inputs.android }}
          ANDROID_RESULT: ${{ needs.android.result }}
          EVENT_NAME: ${{ github.event_name }}
          HARMONY_INPUT: ${{ inputs.harmony }}
          HARMONY_RESULT: ${{ needs.harmony.result }}
          APPLE_INPUT: ${{ inputs.apple }}
          APPLE_RESULT: ${{ needs.apple.result }}
        run: |
          set -euo pipefail

          want_android=false
          want_apple=false
          want_harmony=false

          if [[ "$EVENT_NAME" == "push" ]]; then
            want_android=true
            want_apple=true
          else
            [[ "$ANDROID_INPUT" == "true" ]] && want_android=true
            [[ "$APPLE_INPUT" == "true" ]] && want_apple=true
            [[ "$HARMONY_INPUT" == "true" ]] && want_harmony=true
          fi

          verify_result() {
            local label="$1"
            local wanted="$2"
            local result="$3"

            if [[ "$wanted" == "true" && "$result" != "success" ]]; then
              echo "::error::$label SDK build did not succeed (result: $result)"
              exit 1
            fi
          }

          verify_result "Android" "$want_android" "$ANDROID_RESULT"
          verify_result "Apple" "$want_apple" "$APPLE_RESULT"
          verify_result "HarmonyOS" "$want_harmony" "$HARMONY_RESULT"

      - uses: actions/download-artifact@v4
        with:
          path: dist/sdk-release
          merge-multiple: true

      - name: Upload SDK artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: dist/sdk-release/*
          fail_on_unmatched_files: true
          overwrite_files: true
