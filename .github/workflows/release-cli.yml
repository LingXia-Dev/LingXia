# Release Executor / CLI — INTERNAL, dispatched automatically by "Release /
# 2. Publish Component". Do not run directly except to debug with dry_run;
# the normal release path is: Release / 1 (version PR) -> merge -> Release / 2.
#
# Ships the `lingxia` CLI exclusively as GitHub Release binaries (installed via
# the root install.sh, rustup/deno-style). NO npm distribution.
#
# Job graph:
#   build (3-target matrix)  ─┐
#   build-runner (2 arches)  ─┴─> publish (combine + SHASUMS + gh-release)
#
# The CLI does NOT support Linux yet, so we build only macOS (arm64 + x86_64)
# and Windows (x86_64). Each target builds natively on its own runner. The
# arm64 macOS runner cross-compiles the x86_64-apple-darwin target natively
# (a supported Apple cross); Windows x64 also covers Win11-ARM via emulation.
# lingxia-cli's build.rs embeds the bridge/polyfills JS runtime, so every job
# that compiles the CLI runs build-web-runtime first (incl. Windows).

name: Release Executor / CLI (internal)
run-name: CLI ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. lingxia-cli-v0.8.0)"
        required: true
        type: string
      dry_run:
        description: "Dry run (build only, skip publish)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.95.0"

jobs:
  build:
    name: CLI binary / ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          # Native per-OS builds. The arm64 macOS runner also builds the
          # x86_64-apple-darwin target natively (Apple cross), so Intel Macs are
          # covered. Windows x64 runs on Win11-ARM via emulation.
          - os: darwin
            arch: aarch64
            label: macOS arm64
            runner: macos-latest
            target: aarch64-apple-darwin
            ext: ""
          - os: darwin
            arch: x86_64
            label: macOS x64
            runner: macos-latest
            target: x86_64-apple-darwin
            ext: ""
          - os: windows
            arch: x86_64
            label: Windows x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: release-cli-${{ matrix.os }}-${{ matrix.arch }}

      # lingxia-cli build.rs embeds the bridge/polyfills JS runtime.
      - uses: ./.github/actions/build-web-runtime

      - name: Verify tag matches CLI package version
        # Windows runners default to PowerShell; force Git Bash for awk + [ ].
        shell: bash
        run: |
          tag="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          expected="${tag#lingxia-cli-v}"
          cli_version="$(awk '
            /^\[package\]/ {in_section=1; next}
            /^\[/ {in_section=0}
            in_section && $1 == "version" { gsub(/"/, "", $3); print $3; exit }' tools/lingxia-cli/Cargo.toml)"
          [ -n "$cli_version" ] || { echo "Failed to read lingxia-cli version" >&2; exit 1; }
          [ "$expected" = "$cli_version" ] || { echo "Tag ($expected) != lingxia-cli ($cli_version)" >&2; exit 1; }

      - name: Build
        run: cargo build -p lingxia-cli --release --target ${{ matrix.target }}

      - name: Collect binary
        # Force Git Bash so `cp` + POSIX paths work identically on Windows.
        shell: bash
        run: |
          mkdir -p out
          cp "target/${{ matrix.target }}/release/lingxia${{ matrix.ext }}" "out/lingxia-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}"

      - uses: actions/upload-artifact@v4
        with:
          name: lingxia-${{ matrix.os }}-${{ matrix.arch }}
          path: out/lingxia-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}
          if-no-files-found: error

  build-runner:
    name: macOS runner / ${{ matrix.label }}
    runs-on: macos-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            label: macOS arm64
            target: aarch64-apple-darwin
          - arch: x86_64
            label: macOS x64
            target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: release-runner-${{ matrix.arch }}

      - uses: ./.github/actions/build-web-runtime

      # Generate the gitignored apple SDK assets (resources + swift bindings).
      - uses: ./.github/actions/bootstrap-apple-sdk

      - name: Verify tag matches CLI package version
        run: |
          tag="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          expected="${tag#lingxia-cli-v}"
          cli_version="$(awk '
            /^\[package\]/ {in_section=1; next}
            /^\[/ {in_section=0}
            in_section && $1 == "version" { gsub(/"/, "", $3); print $3; exit }' tools/lingxia-cli/Cargo.toml)"
          [ -n "$cli_version" ] || { echo "Failed to read lingxia-cli version" >&2; exit 1; }
          [ "$expected" = "$cli_version" ] || { echo "Tag ($expected) != lingxia-cli ($cli_version)" >&2; exit 1; }

      - name: Build macOS Runner (${{ matrix.arch }})
        run: bash scripts/release/runner.sh --out dist/runner-release --macos-arch ${{ matrix.arch }}

      - name: Upload Runner zip
        uses: actions/upload-artifact@v4
        with:
          name: lingxia-runner-macos-${{ matrix.arch }}
          path: dist/runner-release/*.zip
          if-no-files-found: error

  publish:
    name: Release / Publish CLI assets
    needs: [build, build-runner]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Verify tag matches CLI package version
        run: |
          tag="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          expected="${tag#lingxia-cli-v}"
          cli_version="$(awk '
            /^\[package\]/ {in_section=1; next}
            /^\[/ {in_section=0}
            in_section && $1 == "version" { gsub(/"/, "", $3); print $3; exit }' tools/lingxia-cli/Cargo.toml)"
          [ -n "$cli_version" ] || { echo "Failed to read lingxia-cli version" >&2; exit 1; }
          [ "$expected" = "$cli_version" ] || { echo "Tag ($expected) != lingxia-cli ($cli_version)" >&2; exit 1; }

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble release assets + SHASUMS
        id: assemble
        run: |
          tag="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          version="${tag#lingxia-cli-v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

          mkdir -p release-assets

          # CLI binaries. The download-artifact dir is the upload-artifact name
          # (lingxia-<os>-<arch>); the file inside carries the platform ext
          # (windows -> .exe). darwin has no ext.
          cp "artifacts/lingxia-darwin-aarch64/lingxia-darwin-aarch64"       "release-assets/lingxia-darwin-aarch64"
          cp "artifacts/lingxia-darwin-x86_64/lingxia-darwin-x86_64"         "release-assets/lingxia-darwin-x86_64"
          cp "artifacts/lingxia-windows-x86_64/lingxia-windows-x86_64.exe"   "release-assets/lingxia-windows-x86_64.exe"

          # Runner zips (one per macOS arch).
          cp artifacts/lingxia-runner-macos-*/*.zip release-assets/

          # Combined checksum file over every release asset. `lingxia-*` covers
          # the darwin binaries and the windows `lingxia-windows-x86_64.exe`;
          # `*.zip` covers the runner zips.
          # `--` stops option parsing so glob expansions starting with `-`
          # aren't mistaken for flags, while keeping plain filenames (no `./`
          # prefix) in the SHASUMS file so install.sh's grep matches.
          shasums="release-assets/SHASUMS256-$version.txt"
          (cd release-assets && sha256sum -- lingxia-* *.zip > "SHASUMS256-$version.txt")
          echo "Release assets:"
          ls -la release-assets/
          echo "Checksums:"
          cat "$shasums"

      - name: Dry run summary
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        run: |
          version="${{ steps.assemble.outputs.version }}"
          echo "DRY RUN - would upload the following to release lingxia-cli-v$version:"
          ls -la release-assets/
          echo "--- SHASUMS256-$version.txt ---"
          cat "release-assets/SHASUMS256-$version.txt"

      - name: Upload assets to GitHub Release
        if: github.event_name != 'workflow_dispatch' || !inputs.dry_run
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: release-assets/*
          fail_on_unmatched_files: true
