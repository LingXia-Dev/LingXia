# Release Executor / CLI — INTERNAL, dispatched automatically by "Release /
# 2. Publish Component". Do not run directly except to debug with dry_run;
# the normal release path is: Release / 1 (version PR) -> merge -> Release / 2.
#
# Ships the `lingxia` CLI exclusively as GitHub Release binaries (installed via
# the root install.sh, rustup/deno-style). NO npm distribution.
#
# Job graph:
#   build (4-target matrix)  ─┐
#   build-runner (2 arches)  ─┴─> publish (combine + SHASUMS + gh-release)
#
# The CLI does NOT support Linux yet, so we build only macOS (arm64 + x86_64)
# and Windows (arm64 + x86_64). Each target builds on its OS runner. The arm64
# macOS runner cross-compiles the x86_64-apple-darwin target natively (a
# supported Apple cross).
# lingxia-cli's build.rs embeds the bridge/polyfills JS runtime, so every job
# that compiles the CLI runs build-web-runtime first (incl. Windows).

name: Release Executor / CLI (internal)
run-name: CLI ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. lingxia-cli-v0.8.0)"
        required: true
        type: string
      dry_run:
        description: "Dry run (build only, skip publish)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.95.0"

jobs:
  # Footgun guard: this executor is dispatched by "Release / 2. Publish
  # Component" (which runs it as github-actions[bot]). Block humans from running
  # it by hand with a real publish, which would skip Release / 2's ordering and
  # version-in-code checks. Manual dry_run=true is allowed for debugging.
  guard:
    name: Guard manual dispatch
    runs-on: ubuntu-latest
    steps:
      - name: Reject manual non-dry-run runs
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          ACTOR: ${{ github.triggering_actor }}
        run: |
          set -euo pipefail
          if [[ "$DRY_RUN" == "true" ]]; then
            echo "Dry run — manual dispatch allowed."
            exit 0
          fi
          if [[ "$ACTOR" == "github-actions[bot]" ]]; then
            echo "Dispatched by Release / 2. Publish Component — allowed."
            exit 0
          fi
          echo "::error::Internal release executor — do not run it by hand."
          echo "::error::Use 'Release / 2. Publish Component' for a real release, or set dry_run=true to debug. (triggering_actor=$ACTOR)"
          exit 1

  build:
    name: CLI binary / ${{ matrix.label }}
    needs: guard
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          # Native per-OS builds. The arm64 macOS runner also builds the
          # x86_64-apple-darwin target natively (Apple cross), so Intel Macs are
          # covered. Windows publishes both x64 and arm64 assets.
          - os: darwin
            arch: aarch64
            label: macOS arm64
            runner: macos-latest
            target: aarch64-apple-darwin
            ext: ""
          - os: darwin
            arch: x86_64
            label: macOS x64
            runner: macos-latest
            target: x86_64-apple-darwin
            ext: ""
          - os: windows
            arch: x86_64
            label: Windows x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
          - os: windows
            arch: aarch64
            label: Windows arm64
            runner: windows-latest
            target: aarch64-pc-windows-msvc
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: release-cli-${{ matrix.os }}-${{ matrix.arch }}

      # lingxia-cli build.rs embeds the bridge/polyfills JS runtime.
      - uses: ./.github/actions/build-web-runtime

      - name: Verify tag matches CLI package version
        # Windows runners default to PowerShell; force Git Bash for awk + [ ].
        shell: bash
        run: |
          tag="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          expected="${tag#lingxia-cli-v}"
          cli_version="$(awk '
            /^\[package\]/ {in_section=1; next}
            /^\[/ {in_section=0}
            in_section && $1 == "version" { gsub(/"/, "", $3); print $3; exit }' tools/lingxia-cli/Cargo.toml)"
          [ -n "$cli_version" ] || { echo "Failed to read lingxia-cli version" >&2; exit 1; }
          [ "$expected" = "$cli_version" ] || { echo "Tag ($expected) != lingxia-cli ($cli_version)" >&2; exit 1; }

      - name: Build
        run: cargo build -p lingxia-cli --release --target ${{ matrix.target }}

      - name: Collect binary
        # Force Git Bash so `cp` + POSIX paths work identically on Windows.
        shell: bash
        run: |
          mkdir -p out
          cp "target/${{ matrix.target }}/release/lingxia${{ matrix.ext }}" "out/lingxia-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}"

      - uses: actions/upload-artifact@v4
        with:
          name: lingxia-${{ matrix.os }}-${{ matrix.arch }}
          path: out/lingxia-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}
          if-no-files-found: error

  build-runner:
    name: macOS runner / ${{ matrix.label }}
    needs: guard
    runs-on: macos-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            label: macOS arm64
            target: aarch64-apple-darwin
          - arch: x86_64
            label: macOS x64
            target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: release-runner-${{ matrix.arch }}

      - uses: ./.github/actions/build-web-runtime

      # Generate the gitignored apple SDK assets (resources + swift bindings).
      - uses: ./.github/actions/bootstrap-apple-sdk

      - name: Verify tag matches CLI package version
        run: |
          tag="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          expected="${tag#lingxia-cli-v}"
          cli_version="$(awk '
            /^\[package\]/ {in_section=1; next}
            /^\[/ {in_section=0}
            in_section && $1 == "version" { gsub(/"/, "", $3); print $3; exit }' tools/lingxia-cli/Cargo.toml)"
          [ -n "$cli_version" ] || { echo "Failed to read lingxia-cli version" >&2; exit 1; }
          [ "$expected" = "$cli_version" ] || { echo "Tag ($expected) != lingxia-cli ($cli_version)" >&2; exit 1; }

      # Restore the Apple credential store so `lingxia build` signs + notarizes
      # directly from it — same code path as a local signed build, no env
      # plumbing. The two secrets are base64 of the local store files:
      #   APPLE_CREDENTIALS_JSON_BASE64    base64 -i ~/.lingxia/apple/credentials.json
      #   APPLE_DEVELOPER_ID_JSON_BASE64   base64 -i ~/.lingxia/apple/developer-id.json
      # (the latter is produced by `lingxia auth apple import-developer-id`).
      # Without the secrets (forks / unset) the CLI leaves the app ad-hoc
      # signed and the build still succeeds.
      - name: Restore Apple credential store (if secrets present)
        env:
          CREDS_B64: ${{ secrets.APPLE_CREDENTIALS_JSON_BASE64 }}
          DEVID_B64: ${{ secrets.APPLE_DEVELOPER_ID_JSON_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${CREDS_B64:-}" ] || [ -z "${DEVID_B64:-}" ]; then
            echo "ℹ️ Apple signing store not configured — runner will be ad-hoc signed."
            exit 0
          fi
          umask 077
          mkdir -p "$HOME/.lingxia/apple"
          printf '%s' "$CREDS_B64" | base64 -d > "$HOME/.lingxia/apple/credentials.json"
          printf '%s' "$DEVID_B64" | base64 -d > "$HOME/.lingxia/apple/developer-id.json"
          chmod 600 "$HOME/.lingxia/apple/credentials.json" "$HOME/.lingxia/apple/developer-id.json"
          echo "✅ Apple credential store restored — lingxia build will Developer-ID sign + notarize."

      - name: Build macOS Runner (${{ matrix.arch }})
        run: bash scripts/release/runner.sh --out dist/runner-release --macos-arch ${{ matrix.arch }}

      - name: Upload Runner zip
        uses: actions/upload-artifact@v4
        with:
          name: lingxia-runner-macos-${{ matrix.arch }}
          path: dist/runner-release/*.zip
          if-no-files-found: error

  # The Windows runner is a plain cargo binary (no Swift/Apple steps). It gets
  # its host assets from `lingxia dev` at launch, so we ship just the exe; users
  # unzip it into ~/.lingxia/runner/<version>/ (or run install-local-runner.ps1).
  build-runner-windows:
    name: Windows runner / x64
    needs: guard
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: release-runner-windows-x64

      # lingxia / lingxia-platform build.rs embed the bridge/polyfills JS runtime.
      - uses: ./.github/actions/build-web-runtime

      - name: Verify tag matches CLI package version
        shell: bash
        run: |
          tag="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          expected="${tag#lingxia-cli-v}"
          cli_version="$(awk '
            /^\[package\]/ {in_section=1; next}
            /^\[/ {in_section=0}
            in_section && $1 == "version" { gsub(/"/, "", $3); print $3; exit }' tools/lingxia-cli/Cargo.toml)"
          [ -n "$cli_version" ] || { echo "Failed to read lingxia-cli version" >&2; exit 1; }
          [ "$expected" = "$cli_version" ] || { echo "Tag ($expected) != lingxia-cli ($cli_version)" >&2; exit 1; }

      # Static CRT so the released runner has no MSVC runtime DLL dependency
      # (matches install-local-runner.ps1).
      - name: Build Windows Runner
        shell: bash
        env:
          RUSTFLAGS: "-C target-feature=+crt-static"
        run: cargo build --release --package lingxia-runner-windows --bin lingxia-runner --target x86_64-pc-windows-msvc

      - name: Package Runner zip
        shell: pwsh
        run: |
          $version = (Get-Content tools/lingxia-cli/Cargo.toml |
            Where-Object { $_ -match '^version\s*=\s*"([^"]+)"' } |
            Select-Object -First 1) -replace '^version\s*=\s*"([^"]+)".*', '$1'
          New-Item -ItemType Directory -Force dist/runner-release, stage | Out-Null
          Copy-Item "target/x86_64-pc-windows-msvc/release/lingxia-runner.exe" stage/lingxia-runner.exe
          Set-Content -Path stage/VERSION -Value $version -NoNewline
          Compress-Archive -Path stage/lingxia-runner.exe, stage/VERSION -DestinationPath dist/runner-release/lingxia-runner-windows-x64.zip -Force

      - name: Upload Runner zip
        uses: actions/upload-artifact@v4
        with:
          name: lingxia-runner-windows-x64
          path: dist/runner-release/*.zip
          if-no-files-found: error

  publish:
    name: Release / Publish CLI assets
    needs: [build, build-runner, build-runner-windows]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Verify tag matches CLI package version
        run: |
          tag="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          expected="${tag#lingxia-cli-v}"
          cli_version="$(awk '
            /^\[package\]/ {in_section=1; next}
            /^\[/ {in_section=0}
            in_section && $1 == "version" { gsub(/"/, "", $3); print $3; exit }' tools/lingxia-cli/Cargo.toml)"
          [ -n "$cli_version" ] || { echo "Failed to read lingxia-cli version" >&2; exit 1; }
          [ "$expected" = "$cli_version" ] || { echo "Tag ($expected) != lingxia-cli ($cli_version)" >&2; exit 1; }

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble release assets + SHASUMS
        id: assemble
        run: |
          tag="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          version="${tag#lingxia-cli-v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

          mkdir -p release-assets

          # CLI binaries. The download-artifact dir is the upload-artifact name
          # (lingxia-<os>-<arch>); the file inside carries the platform ext
          # (windows -> .exe). darwin has no ext.
          cp "artifacts/lingxia-darwin-aarch64/lingxia-darwin-aarch64"       "release-assets/lingxia-darwin-aarch64"
          cp "artifacts/lingxia-darwin-x86_64/lingxia-darwin-x86_64"         "release-assets/lingxia-darwin-x86_64"
          cp "artifacts/lingxia-windows-x86_64/lingxia-windows-x86_64.exe"   "release-assets/lingxia-windows-x86_64.exe"
          cp "artifacts/lingxia-windows-aarch64/lingxia-windows-aarch64.exe" "release-assets/lingxia-windows-aarch64.exe"

          # Runner zips (one per macOS arch + the Windows x64 runner).
          cp artifacts/lingxia-runner-macos-*/*.zip release-assets/
          cp artifacts/lingxia-runner-windows-*/*.zip release-assets/

          # Combined checksum file over every release asset. `lingxia-*` covers
          # the darwin binaries and the windows `.exe` assets;
          # `*.zip` covers the runner zips.
          # `--` stops option parsing so glob expansions starting with `-`
          # aren't mistaken for flags, while keeping plain filenames (no `./`
          # prefix) in the SHASUMS file so install.sh's grep matches.
          shasums="release-assets/SHASUMS256-$version.txt"
          (cd release-assets && sha256sum -- lingxia-* *.zip > "SHASUMS256-$version.txt")
          echo "Release assets:"
          ls -la release-assets/
          echo "Checksums:"
          cat "$shasums"

      - name: Dry run summary
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        run: |
          version="${{ steps.assemble.outputs.version }}"
          echo "DRY RUN - would upload the following to release lingxia-cli-v$version:"
          ls -la release-assets/
          echo "--- SHASUMS256-$version.txt ---"
          cat "release-assets/SHASUMS256-$version.txt"

      - name: Upload assets to GitHub Release
        if: github.event_name != 'workflow_dispatch' || !inputs.dry_run
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: release-assets/*
          fail_on_unmatched_files: true
