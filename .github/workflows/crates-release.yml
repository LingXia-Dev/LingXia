name: Release Executor / Crates
run-name: Crates ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

on:
  push:
    tags:
      - "lingxia-crates-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. lingxia-crates-v0.1.0)"
        required: true
        type: string
      dry_run:
        description: "Dry run (skip actual publish)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  RUST_TOOLCHAIN: "1.95.0"

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: Swatinem/rust-cache@v2

      - name: Verify tag matches workspace version
        run: |
          tag="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          expected="${tag#lingxia-crates-v}"
          workspace_version="$(awk '
            /^\[workspace\.package\]/ {in_section=1; next}
            /^\[/ {in_section=0}
            in_section && $1 == "version" {
              gsub(/"/, "", $3);
              print $3;
              exit
            }' Cargo.toml)"
          if [ -z "$workspace_version" ]; then
            echo "Failed to read workspace version" >&2
            exit 1
          fi
          if [ "$expected" != "$workspace_version" ]; then
            echo "Tag version ($expected) does not match workspace version ($workspace_version)" >&2
            exit 1
          fi
          echo "Version verified: $workspace_version"

      - name: Dry run (cargo package checks)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        run: bash scripts/release/crates.sh --dry-run

      - name: Publish crates
        if: github.event_name != 'workflow_dispatch' || !inputs.dry_run
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: bash scripts/release/crates.sh --publish --no-verify
