# LingXia host app configuration
#
# This file is the source of truth for the host app project.
# The CLI reads it and generates runtime app.json and ui.json.
# Edit this file, not generated runtime files.

# Host app metadata. This section is required for native app projects.
app:
  # Technical project name. Used for native build paths and the Rust lib's Cargo package name.
  projectName: {{PROJECT_NAME}}
  # Directory of the native Rust library crate (relative to this file).
  rustLibDir: {{RUST_LIB_DIR}}
  # User-facing display name for the host app.
  productName: {{PRODUCT_NAME}}
  # Host app version. Must be semantic version major.minor.patch.
  productVersion: 0.0.1
  # Optional logical publishing ID used by app publishing flows.
  # lingxiaId: {{PROJECT_NAME_COMMENT}}

  # Default env per command (override with --env <developer|preview|release>):
  #   - `lingxia build` / `lingxia dev`: developer (day-to-day work)
  #   - `lingxia package`: release (shippable artifact)
  # Each env has a built-in package-id suffix: developer=".dev",
  # preview=".preview", release=(none). Override via packageIdSuffix below.

  # Optional cloud server. Use a single URL for all envs:
  lingxiaServer: https://api.example.com
  # ...or a per-env map for separate backends:
  # lingxiaServer:
  #   developer: http://127.0.0.1:8080
  #   preview: https://preview-api.example.com
  #   release: https://api.example.com

  # Optional: override the built-in package-id suffix per env. Use "" to opt
  # out of a default. Most projects do not need this block.
  # packageIdSuffix:
  #   developer: ".dev"
  #   preview: ".preview"
  #   release: ""
  # Native platforms included in this project: android, ios, macos, harmony, windows.
  platforms:
{{PLATFORMS}}
  # Home app opened by default. Resource source is declared in resources.bundles.
  homeAppId: {{HOME_APP_ID}}
{{ANDROID_SECTION}}{{IOS_SECTION}}{{MACOS_SECTION}}{{HARMONY_SECTION}}{{WINDOWS_SECTION}}{{UI_SECTION}}
# Native compile-time features for the host Rust library.
# appService: false makes the CLI build native Rust with --no-default-features.
# appService: true keeps native crate defaults and adds the enabled features below.
features:
  # Enable JS/TS AppService runtime support.
  # true -> compile the standard runtime/lingxia-logic and support logic-enabled lxapps.
  # false -> native-only host; bundled/home lxapps must use logic: false.
  appService: {{APP_SERVICE}}
  # Compile devtools bridge/hooks into the host app.
  # lingxia dev may temporarily enable this without changing this file.
  devtools: false

# Platform/runtime integrations that must be predeclared before the SDK auto-enables them.
# Do not list ordinary SDK APIs like camera here; those request permission only when called.
capabilities:
  # Enable push/notification integration where supported.
  # When true, iOS/Harmony SDK initialization may request notification permission and fetch a push token.
  notifications: false
  # Enable the built-in browser (newtab/settings/downloads webui and browser runtime).
  browser: false
  # Enable the built-in terminal runtime. Declare a native terminal surface under `surfaces:`
  # when you want it to appear in host UI.
  terminal: false

# Resource bundle sources copied into native app assets.
# app.homeAppId and ui surfaces reference appId; resources.bundles says where local/package
# assets come from. SDK-reserved appIds (e.g. `app.lingxia.browser`) are not allowed here —
# use the dedicated `browser.webui.*` keys below instead.
resources:
  bundles:
    # Home lxapp bundled with the native app.
    - type: lxapp
      appId: {{HOME_APP_ID}}
      path: {{HOME_APP_PATH}}
    # Optional product lxapp bundled for an App UI surface, for example an assistant panel.
    # - type: lxapp
    #   appId: assistant-lxapp
    #   path: assistant-lxapp

# Optional: override the SDK's default in-app browser webui (used only when
# capabilities.browser is true). Omit to use the npm-published default
# `@lingxia/browser-shell-webui`.
# browser:
#   webui:
#     package: '@lingxia/browser-shell-webui'
#     version: '0.5.1'
{{SHELL_SECTION}}
{{APP_LINKS_SECTION}}
# Storage and cache limits. Values are MiB.
# Set a *MaxSizeMB to 0 to disable that limit.
storage:
  # Maximum host temp storage size in MiB.
  tempMaxSizeMB: 1024
  # Per-LxApp usercache size cap in MiB. Cleanup triggers at 80% high water,
  # then LRU-evicts down to 50% low water. 0 disables size enforcement.
  cacheMaxSizeMB: 2048
  # Maximum user data storage size in MiB.
  dataMaxSizeMB: 4096
  # Maximum app-scoped storage size in MiB.
  appStorageMaxSizeMB: 16384
