
# macOS host settings.
macos:
  # macOS bundle identifier.
  bundleId: {{PACKAGE_ID}}
  # Optional macOS deployment target, for example "12.0".
  # deploymentTarget: "12.0"
  # SwiftPM target name for resource lookup. Explicit values are preferred.
  targetName: {{SWIFT_TARGET_NAME}}
  # SwiftPM executable product/binary name.
  executableName: {{SWIFT_TARGET_NAME}}
