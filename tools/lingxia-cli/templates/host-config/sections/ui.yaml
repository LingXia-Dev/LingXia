
# UI declaration: one surface per entry. You declare "what + relationship";
# the Host derives the platform form (window/panel/sidebar/tab/tray) by screen
# size — no macos: / windows: blocks.
#   id      unique id; equals the appId when render: lxapp (opened by id)
#   render  lxapp (web page) | native (host-native, e.g. the built-in terminal)
#   role    main (switchable primary) | aside (docked companion) | float (popup)
#   edge    aside dock edge: left | right | top | bottom (default right)
#   launch  open on start; at most one main has launch (none = launch from tray)
#   entry   sidebar (sidebar item) / tray (menu bar · tray); icon is a
#           repo-relative path, converted to the native format at build
surfaces:
  - id: {{HOME_APP_ID}}      # main screen: your lxapp
    render: lxapp
    role: main
    launch: true
    # tray:                  # off by default; uncomment for a menu-bar / tray app
    #   label: {{PRODUCT_NAME}}
    #   # icon: icons/status.svg
    #   action: activate
    #   # exclusive: true     # menu-bar / tray only, no dock / taskbar icon

  # Right-edge companion example (e.g. an AI assistant). The referenced lxapp
  # must be provided by the runtime / update flow.
  # - id: assistant
  #   render: lxapp
  #   role: aside
  #   edge: right            # left | right | top | bottom
  #   sidebar:               # sidebar entry; click toggles this panel
  #     icon: icons/chat.svg
  #     # section: bottom     # pin to the sidebar footer (system/utility entries)

  # Built-in terminal (requires capabilities.terminal: true). The icon uses the
  # host default — omit `icon`.
  # - id: terminal
  #   render: native
  #   role: aside
  #   edge: bottom           # top | bottom
  #   sidebar: {}

  # Menu-bar / tray app (tray = macOS menu bar / Windows tray icon):
  #   action: toggle      visible -> hide, hidden -> show
  #   action: activate    show and bring to front
  #   exclusive: true     no dock / taskbar icon — the app lives only in the
  #                       tray. Default false keeps the dock /
  #                       taskbar icon alongside the tray.
  #   icon is optional; label is used for tooltip / text-only status items.

# Note: capabilities (feature/permission gates) and resources (local bundles)
# are independent top-level blocks — never put them inside a surface.
