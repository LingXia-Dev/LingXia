[package]
name = "{{PROJECT_NAME}}"
version = "0.1.0"
edition = "2024"
description = "Native library for LingXia App (builds to .so/.a)"

[lib]
name = "lingxia"
# cdylib for Android/Harmony (.so), staticlib for iOS (.a)
crate-type = ["cdylib", "staticlib"]

[features]
default = {{HOST_DEFAULT_FEATURES}}
standard = ["lingxia/standard"]
shell-runtime = ["lingxia/shell-runtime", "webview-input", "standard"]
terminal-runtime = ["lingxia/terminal-runtime"]
devtools = ["dep:lingxia_devtool", "lingxia_devtool/browser"]
webview-input = ["lingxia/webview-input"]

[dependencies]
lingxia = { version = "{{LINGXIA_VERSION}}", default-features = false, features = {{LINGXIA_DEP_FEATURES}} }
lingxia_devtool = { package = "lingxia-devtool", version = "{{LINGXIA_VERSION}}", optional = true, default-features = false }

# Platform-specific dependencies for FFI
{{ANDROID_DEPS_BLOCK}}
{{HARMONY_DEPS_BLOCK}}

# Release profile: optimize for size
[profile.release]
opt-level = 'z'
lto = true
codegen-units = 1
strip = true
