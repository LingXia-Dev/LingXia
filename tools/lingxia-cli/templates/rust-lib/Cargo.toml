[package]
name = "{{PROJECT_NAME}}"
version = "0.1.0"
edition = "2024"
description = "Native library for LingXia App (builds to .so/.a)"

[lib]
name = "lingxia"
# cdylib for Android/Harmony (.so), staticlib for iOS (.a)
crate-type = ["cdylib", "staticlib"]

[features]
default = ["tls-aws-lc"]
tls-aws-lc = ["lingxia/tls-aws-lc"]
tls-ring = ["lingxia/tls-ring"]

[dependencies]
lingxia = { version = "{{LINGXIA_VERSION}}", default-features = false }

# Platform-specific dependencies for FFI
[target.'cfg(target_os = "android")'.dependencies]
jni = "0.22.1"

[target.'cfg(target_env = "ohos")'.dependencies]
napi-ohos = "1.1"
napi-derive-ohos = "1.1"

# Release profile: optimize for size
[profile.release]
opt-level = 'z'
lto = true
codegen-units = 1
strip = true
