[package]
name = "lingxia-cli"
# Tools version: CLI + Runner release together on their own cadence. Keep in
# sync with tools/lingxia-runner. The CLI's CARGO_PKG_VERSION drives both the
# Runner compatibility check and the Runner .app's CFBundleShortVersionString,
# so this is the single source of truth.
#
# Only the PATCH is independent of the SDK crates ([workspace.package]). The
# major.minor MUST track the workspace: the CLI embeds the base-runtime bridge
# (packages/lingxia-bridge), which is version-locked to the workspace, and
# build.rs fails the build on a mismatch. A CLI release is "the CLI for base
# runtime X.Y" — so bump to the workspace's major.minor whenever it moves.
version = "0.9.1"
edition.workspace = true
build = "build.rs"

[package.metadata.lingxia]
bridge-version = "0.9.0"
polyfills-version = "0.9.0"
types-version = "0.9.0"
rong-version = "0.4.0"
rust-crate-version = "0.9.0"
sdk-version = "0.9.0"
shell-webui-version = "0.9.0"
resource-bundle-version = "0.9.0"

[[bin]]
name = "lingxia"
path = "src/main.rs"

[dependencies]
clap = { version = "4.5", features = ["derive", "env"] }
anyhow = "1.0"

dialoguer = { version = "0.12", features = ["completion"] }
console = "0.16"
colored = "3.1"
indicatif = "0.18"
include_dir = "0.7"

serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml_ng = "0.10"
toml = "1.1.2"
semver = "1.0"
json5 = "1.3"
ureq = "3.2"
rustls-native-certs = "0.8"
zip = "8.1"
chrono = { version = "0.4", features = ["serde"] }
dirs = "6.0"
tempfile = "3.24"
flate2 = "1.1"
tar = "0.4"
ctrlc = "3.4"

# Apple signing and API
p256 = { version = "0.13", features = ["ecdsa", "pkcs8", "pem"] }
base64 = "0.22"
rcgen = "0.14"
rsa = { version = "0.9", features = ["pem"] }

# Apple ID authentication (SRP, crypto)
sha2 = "0.11"
sha1 = "0.11"
hmac = "0.13"
aes = "0.9"
aes-gcm = "0.10"
cbc = "0.2"
num-bigint = "0.4"
rand = "0.10"
uuid = { version = "1.20", features = ["v4"] }
plist = "1"
tungstenite = { version = "0.29", features = ["native-tls"] }
x509-parser = "0.18"

which = "8.0"
urlencoding = "2.1"

image = { version = "0.25.10", default-features = false, features = ["png", "webp"] }

# Resource-generation deps (i18n/icons), absorbed from the former
# standalone `lingxia-gen` crate; see src/gen/.
Inflector = "0.11"
svg2pdf = "0.13"
resvg = "0.45.1"
tiny-skia = "0.11.4"
usvg = "0.45.1"
roxmltree = "0.21"
jsonschema = "0.46"
lingxia-devtool-protocol = { workspace = true }
lingxia-log = { workspace = true }

# LxApp build — oxc-based JS/TS compilation
oxc_parser = "0.135"
oxc_resolver = "11.19.1"
oxc_transformer = "0.135"
oxc_codegen = "0.135"
oxc_minifier = "0.135"
oxc_allocator = "0.135"
oxc_span = "0.135"
oxc_ast = "0.135"
oxc_ast_visit = "0.135"
oxc_syntax = "0.135"
oxc_semantic = "0.135"
oxc_sourcemap = "7.0"
sysinfo = "0.39"

[target.'cfg(not(target_os = "windows"))'.dependencies]
openssl = { version = "0.10", features = ["vendored"] }

[build-dependencies]
serde_json = "1.0"
toml = "1.1.2"

[dev-dependencies]
filetime = "0.2"
