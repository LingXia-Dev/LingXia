[package]
name = "lingxia-cli"
version.workspace = true
edition.workspace = true

[[bin]]
name = "lingxia"
path = "src/main.rs"

[dependencies]
clap = { version = "4.5", features = ["derive", "env"] }
anyhow = "1.0"

dialoguer = { version = "0.12", features = ["completion"] }
console = "0.16"
colored = "3.1"
indicatif = "0.18"
include_dir = "0.7"

serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml_ng = "0.10"
semver = "1.0"
json5 = "1.3"
ureq = "3.2"
rustls-native-certs = "0.8"
zip = "8.1"
chrono = { version = "0.4", features = ["serde"] }
dirs = "6.0"
tempfile = "3.24"
flate2 = "1.1"
tar = "0.4"

# Apple signing and API
p256 = { version = "0.13", features = ["ecdsa", "pkcs8", "pem"] }
base64 = "0.22"
rcgen = "0.14"
rsa = { version = "0.9", features = ["pem"] }

# Apple ID authentication (SRP, crypto)
sha2 = "0.10"
sha1 = "0.10"
hmac = "0.12"
pbkdf2 = { version = "0.12", features = ["simple"] }
aes = "0.8"
aes-gcm = "0.10"
cbc = "0.1"
num-bigint = "0.4"
rand = "0.10"
uuid = { version = "1.20", features = ["v4"] }
plist = "1"
tungstenite = { version = "0.29", features = ["native-tls"] }
x509-parser = "0.18"

which = "8.0"
adb_client = "3.0.1"
urlencoding = "2.1"

image = { version = "0.25", default-features = false, features = ["png", "webp"] }

openssl = { version = "0.10", features = ["vendored"] }

# LxApp build — oxc-based JS/TS compilation
oxc_parser = "0.123.0"
oxc_resolver = "11.19.1"
oxc_transformer = "0.123.0"
oxc_codegen = "0.123.0"
oxc_minifier = "0.123.0"
oxc_allocator = "0.123.0"
oxc_span = "0.123.0"
oxc_ast = "0.123.0"
oxc_ast_visit = "0.123.0"
oxc_syntax = "0.123.0"
oxc_sourcemap = "6.1.1"
oxc_semantic = "0.123.0"
