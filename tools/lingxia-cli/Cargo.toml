[package]
name = "lingxia-cli"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "lingxia"
path = "src/main.rs"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
anyhow = "1.0"

dialoguer = "0.11"
console = "0.15"
colored = "2.1"

serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

which = "6.0"
adb_client = "3.0.1"

[dev-dependencies]
tempfile = "3.8"
