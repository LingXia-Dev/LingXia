[package]
name = "lingxia-cli"
version = "0.0.9"
edition = "2024"

[[bin]]
name = "lingxia"
path = "src/main.rs"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
anyhow = "1.0"

dialoguer = { version = "0.12", features = ["completion"] }
console = "0.16"
colored = "3.1"
indicatif = "0.18"

serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
ureq = "3.1"
rustls-native-certs = "0.8"
zip = "7.2"
chrono = { version = "0.4", features = ["serde"] }
dirs = "6.0"
tempfile = "3.24"

# Apple signing and API
p256 = { version = "0.13", features = ["ecdsa", "pkcs8", "pem"] }
base64 = "0.22"
rcgen = "0.13"
rsa = { version = "0.9", features = ["pem"] }

# Apple ID authentication (SRP, crypto)
sha2 = "0.10"
sha1 = "0.10"
hmac = "0.12"
pbkdf2 = { version = "0.12", features = ["simple"] }
aes = "0.8"
aes-gcm = "0.10"
cbc = "0.1"
num-bigint = "0.4"
rand = "0.9"
uuid = { version = "1.20", features = ["v4"] }
plist = "1"
tungstenite = { version = "0.28", features = ["native-tls"] }
x509-parser = "0.16"

which = "8.0"
adb_client = "3.0.1"

# Image processing for app icon generation
image = { version = "0.25", default-features = false, features = ["png", "webp"] }

[dev-dependencies]
