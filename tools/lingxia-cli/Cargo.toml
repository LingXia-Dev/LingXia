[package]
name = "lingxia-cli"
version = "0.0.9"
edition = "2024"

[[bin]]
name = "lingxia"
path = "src/main.rs"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
anyhow = "1.0"

dialoguer = { version = "0.12", features = ["completion"] }
console = "0.16"
colored = "3.1"
indicatif = "0.17"

serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
ureq = "3.1"

which = "8.0"
adb_client = "3.0.1"

# Image processing for app icon generation
image = { version = "0.25", default-features = false, features = ["png", "webp"] }

[dev-dependencies]
tempfile = "3.24"
