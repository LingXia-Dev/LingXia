[package]
name = "lingxia-runner-windows"
# Tools version. Keep in sync with tools/lingxia-cli and macos/runner-lib.
version = "0.10.1"
edition.workspace = true
publish = false

[[bin]]
name = "lingxia-runner"
path = "src/main.rs"

[features]
# Cloud provider. Off by default; `lingxia package/build --with-provider cloud`
# injects the provider crate (+ the root crates.io->local patches it needs) and
# activates this feature, which pulls in the shared runner-config resolver.
cloud = ["dep:lingxia-runner-config"]

# The runner is a dev container, so it asks the cloud provider for its
# development behavior in addition to runtime lingxiaServer/lingxiaId overrides.
# The CLI reads this to decide which provider features to enable; it hardcodes
# no provider implementation details.
[package.metadata.lingxia.providers.cloud]
features = ["dev"]

[dependencies]
# The device-frame runner hosts a single lxapp in the shell, but self/aside URL
# targets must stay in-app (never the system browser), so it takes the browser
# ENGINE (`browser-runtime`, which implies `shell-chrome`) without the
# `browser-shell` webui product — mirroring the macOS runner's feature set.
lingxia = { workspace = true, features = ["standard", "devtool", "webview-input"] }
# The runner links the browser engine (below), so the devtool bridge carries
# its browser commands too — otherwise `lxdev browser ...` errors on Windows.
lingxia_devtool = { workspace = true, features = ["browser", "test-runtime"] }
lingxia-windows-sdk = { workspace = true, features = ["standard", "browser-runtime", "webview-input", "device-frame"] }
lxapp = { workspace = true, default-features = false }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
# Shared resolver for the dev runner's config.toml overrides. Only needed when
# the provider is injected. Shared with the macOS runner.
lingxia-runner-config = { workspace = true, optional = true }

[build-dependencies]
lingxia-windows-build = { workspace = true }
