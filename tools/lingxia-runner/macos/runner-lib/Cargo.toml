[package]
name = "lingxia-runner-lib"
# Tools version — keep in sync with tools/lingxia-cli (CLI + Runner release
# together). Only the PATCH is independent of the SDK crates; the major.minor
# MUST track [workspace.package] because the Runner embeds the workspace-locked
# base-runtime bridge. See tools/lingxia-cli/Cargo.toml for the full rationale.
version = "0.9.1"
edition.workspace = true
publish = false

# Static library linked into the macOS Swift "LingXia Runner.app".
[lib]
name = "lingxia"
crate-type = ["staticlib"]

# The macOS Runner ships the full shell chrome. The Windows dev runner lives
# in tools/lingxia-runner/windows so platform entry crates stay separated.
[dependencies]
lingxia = { workspace = true, features = ["standard", "browser-shell", "webview-input"] }
lingxia_devtool = { workspace = true, features = ["browser"] }
