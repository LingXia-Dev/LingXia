[package]
name = "lingxia-runner-lib"
# Tools version — keep in sync with tools/lingxia-cli (CLI + Runner release
# together). Only the PATCH is independent of the SDK crates; the major.minor
# MUST track [workspace.package] because the Runner embeds the workspace-locked
# base-runtime bridge. See tools/lingxia-cli/Cargo.toml for the full rationale.
version = "0.10.1"
edition.workspace = true
publish = false

# Static library linked into the macOS Swift "LingXia Runner.app".
[lib]
name = "lingxia"
crate-type = ["staticlib"]

[features]
# Cloud provider. Inert by default; `lingxia package/build --with-provider cloud`
# injects the provider crate + (this crate is a workspace member) the root
# crates.io->local patches it needs.
cloud = []

# The runner is a dev container, so it asks the cloud provider for `dev` — the
# runtime lingxiaServer/lingxiaId overrides + mock switch. The CLI reads this to
# decide which provider features to enable; it hardcodes no provider knowledge.
[package.metadata.lingxia.providers.cloud]
features = ["dev"]

# The macOS Runner is a development container: it needs browser runtime support
# for lx.surface URL/browser surfaces, but it must not require the product
# browser shell webui bundle.
[dependencies]
lingxia = { workspace = true, features = ["standard", "devtool", "browser-runtime", "webview-input", "automation"] }
lingxia_devtool = { workspace = true, features = ["browser", "test-runtime"] }
libc = "0.2"
serde = { workspace = true }
serde_json = { workspace = true }
# Shared resolver for the dev runner's config (config.toml overrides, mock dir,
# lxapp routing); mapped onto the provider's types below. This stays a regular
# dependency so `cloud = []` remains available for build-time provider injection.
lingxia-runner-config = { workspace = true }
