[package]
name = "lingxia-runner-config"
# Tools version — keep in sync with the runners that consume it.
version = "0.10.1"
edition.workspace = true
publish = false

# Resolves the dev runner's config.toml overrides into plain data.
# Dependency-light on purpose: the provider's option types live only in the
# runner crates (injected at build time), which map this onto them.
[dependencies]
toml = "1.1.2"
