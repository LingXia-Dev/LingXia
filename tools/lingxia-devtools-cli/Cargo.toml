[package]
name = "lingxia-devtools-cli"
version.workspace = true
edition.workspace = true

[[bin]]
name = "lxdev"
path = "src/main.rs"

[dependencies]
libc = "0.2"
anyhow = "1.0"
clap = { version = "4.5", features = ["derive"] }
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
lingxia-devtool-protocol = { workspace = true, features = ["broker"] }
lingxia-computer-use = { workspace = true }
tungstenite = { version = "0.29", features = ["native-tls"] }
owo-colors = "4.3"
base64 = { workspace = true }
ctrlc = "3.5"

# `lxdev test` bundler — the same Oxc components as lingxia-cli's Logic
# bundler, but a dedicated entry mode (no Page()/App() rewrites).
oxc_parser = "0.138"
oxc_resolver = "11.23.0"
oxc_transformer = "0.138"
oxc_codegen = "0.138"
oxc_allocator = "0.138"
oxc_span = "0.138"
oxc_ast = "0.138"
oxc_ast_visit = "0.138"
oxc_semantic = "0.138"
oxc_sourcemap = "8.1"

[dev-dependencies]
tempfile = "3"
