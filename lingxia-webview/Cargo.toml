[package]
name = "lingxia"
version = "0.1.0"
edition = "2024"

[lib]
name = "lingxia"
crate-type = ["cdylib"]

[dependencies]
# Local crate dependency
miniapp = { package = "lingxia-miniapp", path = "../lingxia-miniapp" }

# Use workspace dependencies
serde_json = { workspace = true }
http = { workspace = true }

# Android-specific dependencies
[target.'cfg(target_os = "android")'.dependencies]
jni = "0.21.1"
log = "0.4.27"
android_logger = "0.15.0"
ndk-sys = "0.6.0"
ndk = "0.9.0"
