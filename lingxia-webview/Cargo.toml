[package]
name = "lingxia"
version = "0.1.0"
edition = "2024"

[lib]
name = "lingxia"
crate-type = ["cdylib"]

[dependencies]
miniapp = { package = "lingxia_miniapp", path = "../lingxia-miniapp" }
jni = "0.21.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
log = "0.4.27"
android_logger = "0.15.0"
ndk-sys = "0.6.0"
http = "1.3.1"

[profile.release]
opt-level = 'z'
lto = true
codegen-units = 1
