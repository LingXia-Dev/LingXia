<!DOCTYPE html>
<html>
<head>
    <title>MiniApp Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            height: 100%;
            width: 100%;
            font-size: 16px; /* Base font size */
        }
        body {
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column; /* Stack items vertically */
            align-items: center;
            justify-content: center;
            padding: 20px; /* Add some padding */
            background-color: #ffffff;
            font-family: Arial, sans-serif;
            text-align: center; /* Center text */
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }
        .button {
            padding: 12px 24px; /* Slightly smaller padding */
            font-size: 1rem;   /* Use relative font size */
            background-color: #007bff; /* Blue background */
            color: white;
            border: none;
            border-radius: 5px; /* Less rounded corners */
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 20px; /* Add space above the button */
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }
        .button:active {
            background-color: #0056b3; /* Darker blue on active */
            transform: scale(0.98);
        }
        h1 {
            margin-bottom: 10px; /* Space below heading */
            font-size: 1.8rem;
        }
        p {
            margin-bottom: 20px; /* Space below paragraph */
            font-size: 1rem;
            color: #555; /* Grey text */
        }
    </style>
</head>
<body>
    <h1>Message Page</h1>
    <p>This is the message page content.</p>

    <button class="button" onclick="navigateToDemoPage()">Navigate to Demo Page</button>

    <script>
        function navigateToDemoPage() {
            if (window.lingxia && window.lingxia.postMessage) {
                window.lingxia.postMessage(JSON.stringify({
                    type: 'NAVIGATE_TO',
                    data: {
                        path: 'pages/message/navi/to.html'
                    }
                }));
            } else {
                console.error('lingxia bridge not found!');
            }
        }
    </script>
</body>
</html>
