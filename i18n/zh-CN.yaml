  3005: "存储权限被拒绝"
  3006: "通知权限被拒绝"
  3007: "蓝牙权限被拒绝"

  # 4xxx - Service/System errors
  4000: "服务不可用"
  4001: "定位服务未开启"
  4002: "蓝牙未开启"
  4003: "NFC未开启"

