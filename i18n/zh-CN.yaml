# Error Codes (4-digit: Xyyy where X=category, yyy=specific)
# 1xxx: General errors
# 2xxx: User actions
# 3xxx: Permission errors
# 4xxx: Service/System errors
# 5xxx: Network errors
# 6xxx: Feature limitations
err_code:
  # 1xxx - General errors
  1000: "未知错误"
  1001: "操作失败"
  1002: "参数无效"
  1003: "资源不存在"
  1004: "初始化失败"
  1005: "内部错误"

  # 2xxx - User actions
  2000: "用户取消"
  2001: "用户拒绝"

  # 3xxx - Permission errors
  3000: "权限被拒绝"
  3001: "相机权限被拒绝"
  3002: "定位权限被拒绝"
  3003: "麦克风权限被拒绝"
