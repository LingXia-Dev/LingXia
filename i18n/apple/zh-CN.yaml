# Apple-only SDK strings (iOS / macOS Localizable.strings).
#
# 仅供 `lingxia-sdk/apple/Sources/Resources/*.lproj/Localizable.strings` 使用。
# 占位符使用 Apple 原生语法（`%@`）。

# macOS 桌面外壳：宿主应用更新就绪后，在侧边栏图标上方展示的提示气泡。
# `%@` 为应用产品名。
update:
  ready_to_install: "%@ 已准备好更新！"
  click_to_restart: "点击重启"
  available_title: "%@ 有可用更新"
  click_to_install: "点击安装"
  # 居中“发现新版本”卡片（第一阶段）。
  card_title: "发现新版本"
  card_version: "版本 %@"
  card_notes_title: "更新内容"
  card_later: "稍后"
  card_restart: "立即重启"

# lxapp 页面右键菜单（macOS）。refresh 仅当页面开启下拉刷新时出现；编辑项
# 覆盖 WebKit 默认标题，使精简后的菜单完全本地化。
menu:
  refresh: "刷新"
  copy: "复制"
  cut: "剪切"
  paste: "粘贴"
  select_all: "全选"
