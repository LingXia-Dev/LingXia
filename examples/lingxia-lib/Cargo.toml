[package]
name = "lingxia-example-host"
version = "0.1.0"
edition = "2024"
description = "Native library for LingXia example App (builds to .so/.a)"

[lib]
name = "lingxia"
# cdylib for Android/Harmony (.so), staticlib for iOS (.a)
crate-type = ["cdylib", "staticlib"]

[features]
default = ["standard"]
standard = ["lingxia/standard"]
shell-runtime = ["lingxia/shell-runtime", "webview-input", "standard"]
terminal-runtime = ["lingxia/terminal-runtime"]
cloud = ["dep:lingxia-cloud", "lingxia-cloud/all", "standard"]
devtools = ["dep:lingxia_devtool", "lingxia_devtool/browser"]
webview-input = ["lingxia/webview-input"]

[dependencies]
lingxia = { version = "0.6.3", default-features = false }
lingxia_devtool = { package = "lingxia-devtool", version = "0.6.3", optional = true, default-features = false }
lingxia-cloud = { git = "https://gitea.julibits.com/lingxia/lingxia-device-cloud.git", optional = true, features = ["all"] }
rong = { version = "0.3.1", default-features = false }
log = "0.4.29"

# Platform-specific dependencies for FFI
[target.'cfg(target_os = "android")'.dependencies]
jni = "0.22.1"

[target.'cfg(target_env = "ohos")'.dependencies]
napi-ohos = "1.1"
napi-derive-ohos = "1.1"

# Release profile: optimize for size
[profile.release]
opt-level = 'z'
lto = true
codegen-units = 1
strip = true
