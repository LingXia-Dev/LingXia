[package]
name = "lingxia-lib"
version = "0.1.0"
edition = "2024"
description = "Native library for the example app (builds to .so/.a)"

[lib]
# cdylib for Android/Harmony (.so), staticlib for iOS (.a)
crate-type = ["cdylib", "staticlib"]

[features]
default = ["tls-aws-lc"]
tls-aws-lc = ["lingxia/tls-aws-lc", "lingxia-cloud/tls-aws-lc"]
tls-ring = ["lingxia/tls-ring", "lingxia-cloud/tls-ring"]

[dependencies]
lingxia = { path = "../../lingxia", default-features = false }
rong = { workspace = true }
log = { workspace = true }

# Platform-specific dependencies for FFI
[target.'cfg(target_os = "android")'.dependencies]
jni = "0.21.1"

[target.'cfg(target_env = "ohos")'.dependencies]
napi-ohos = { workspace = true }
napi-derive-ohos = { workspace = true }
