[package]
name = "lingxia-lib"
version = "0.1.0"
edition = "2024"
description = "Native library for LingXia example App (builds to .so/.a)"

[lib]
name = "lingxia"
# cdylib for Android/Harmony (.so), staticlib for iOS (.a)
crate-type = ["cdylib", "staticlib"]

[features]
shell = ["lingxia/shell"]
cloud = ["dep:lingxia-cloud", "lingxia-cloud/all"]

[dependencies]
lingxia = { path = "../../crates/lingxia" }
lingxia-cloud = { path = "../../../lingxia-device-cloud", optional = true }
rong = { version = "0.3.0", default-features = false }
log = "0.4.29"

# Platform-specific dependencies for FFI
[target.'cfg(target_os = "android")'.dependencies]
jni = "0.22.1"

[target.'cfg(target_env = "ohos")'.dependencies]
napi-ohos = "1.1"
napi-derive-ohos = "1.1"

# Release profile: optimize for size
[profile.release]
opt-level = 'z'
lto = true
codegen-units = 1
strip = true
