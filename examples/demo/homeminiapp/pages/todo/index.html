<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LingXia • Todo</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
    <section class="todoapp" id="app" v-cloak>
        <h1>todos</h1>
        <input
            class="new-todo"
            placeholder="What needs to be done?"
            v-model="newTodo"
            @keyup.enter="handleAddTodo"
            autofocus
        >
        <div class="main" v-show="data && data.todos && data.todos.length > 0">
            <input
                id="toggle-all"
                class="toggle-all"
                type="checkbox"
                :checked="todoStats.active === 0"
                @change="handleToggleAll"
            >
            <label for="toggle-all">Mark all as complete</label>
            <ul class="todo-list">
                <li
                    v-for="todo in filteredTodos"
                    :key="todo.id"
                    :class="{ completed: todo.completed }"
                >
                    <div class="view">
                        <input
                            class="toggle"
                            type="checkbox"
                            :checked="todo.completed"
                            @change="toggleTodo({ id: todo.id })"
                        >
                        <label>{{ todo.text }}</label>
                        <button
                            class="destroy"
                            @click="deleteTodo({ id: todo.id })"
                        ></button>
                    </div>
                </li>
            </ul>
        </div>
        <footer class="footer" v-show="data && data.todos && data.todos.length > 0">
            <span class="todo-count">
                <strong>{{ todoStats.active }}</strong>
                {{ todoStats.active === 1 ? 'item' : 'items' }} left
            </span>
            <ul class="filters">
                <li>
                    <a
                        href="#/"
                        :class="{ selected: currentFilter === 'all' }"
                        @click.prevent="setFilter({ filter: 'all' })"
                    >All</a>
                </li>
                <li>
                    <a
                        href="#/active"
                        :class="{ selected: currentFilter === 'active' }"
                        @click.prevent="setFilter({ filter: 'active' })"
                    >Active</a>
                </li>
                <li>
                    <a
                        href="#/completed"
                        :class="{ selected: currentFilter === 'completed' }"
                        @click.prevent="setFilter({ filter: 'completed' })"
                    >Completed</a>
                </li>
            </ul>
            <button
                class="clear-completed"
                v-show="todoStats.completed > 0"
                @click="clearCompleted"
            >
                Clear completed
            </button>
        </footer>
    </section>

    <footer class="info">
        <p>Double-click to edit a todo</p>
    </footer>

    <style>
        /* Page-specific overrides for Todo */
        .new-todo {
            font-size: 18px;
        }

        .todoapp h1 {
            font-size: 80px;
        }

        /* Ensure Vue content is hidden until mounted */
        [v-cloak] {
            display: none !important;
        }

        /* Improve text clarity */
        .todo-list li label {
            font-weight: 400;
            color: #4d4d4d;
            text-shadow: none;
        }

        /* Vue.js v-cloak directive */
        [v-cloak] {
            display: none;
        }

        /* Remove any potential watermark effects */
        .todoapp::before,
        .todoapp::after,
        body::before,
        body::after {
            display: none !important;
        }

        /* Mobile optimizations */
        @media (max-width: 480px) {
            .todoapp {
                margin: 40px auto 20px auto;
                max-width: 95%;
                min-width: 280px;
            }

            .todoapp h1 {
                font-size: 50px;
                top: -80px;
            }

            .new-todo {
                font-size: 16px;
                padding: 14px 14px 14px 50px;
            }

            .todo-list li label {
                padding: 14px 14px 14px 50px;
                font-size: 18px;
            }

            .footer {
                padding: 12px;
                flex-direction: column;
                gap: 10px;
                min-height: 60px;
            }

            .todo-count,
            .clear-completed {
                text-align: center;
                flex: none;
            }

            .filters {
                order: -1;
                margin-bottom: 5px;
            }

            .filters li a {
                padding: 4px 8px;
                margin: 2px;
            }

            .toggle-all + label {
                top: -55px;
            }
        }
    </style>

    <script>
        const { createApp, ref, computed } = Vue;

        createApp({
            setup() {
                const newTodo = ref('');
                const data = useLingXiaData();

                // Debug: log data changes
                console.log('[Todo] Initial data:', data.value);

                const currentFilter = computed(() => data.value?.currentFilter || 'all');

                const filteredTodos = computed(() => {
                    if (!data.value?.todos) return [];
                    const todos = data.value.todos;

                    switch (currentFilter.value) {
                        case 'active':
                            return todos.filter(todo => !todo.completed);
                        case 'completed':
                            return todos.filter(todo => todo.completed);
                        default:
                            return todos;
                    }
                });

                const todoStats = computed(() => {
                    const todos = data.value?.todos || [];
                    return {
                        total: todos.length,
                        completed: todos.filter(t => t.completed).length,
                        active: todos.filter(t => !t.completed).length
                    };
                });

                const handleAddTodo = () => {
                    const text = newTodo.value.trim();
                    if (!text) return;

                    addTodo({ text });
                    newTodo.value = '';
                };

                const handleToggleAll = () => {
                    const allCompleted = todoStats.value.active === 0;
                    data.value.todos.forEach(todo => {
                        if (todo.completed !== !allCompleted) {
                            toggleTodo({ id: todo.id });
                        }
                    });
                };

                return {
                    newTodo,
                    data,
                    currentFilter,
                    filteredTodos,
                    todoStats,
                    handleAddTodo,
                    handleToggleAll
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
