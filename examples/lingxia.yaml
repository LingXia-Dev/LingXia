app:
  projectName: lingxia
  lingxiaId: lingxia
  productName: LingXia App Demo
  productVersion: 0.2.0
  platforms:
    - android
    - ios
    - macos
    - harmony
  homeLxAppID: lingxia-showcase
  cacheMaxAgeDays: 7

android:
  packageId: com.lingxia.example
  minSdk: 29
  targetSdk: 35
  compileSdk: 35

ios:
  bundleId: com.lingxia.example
  deploymentTarget: "17.0"
  targetName: lxapp

macos:
  bundleId: com.lingxia.example
  deploymentTarget: "12.0"
  targetName: LingXiaDemo
  executableName: LingXiaDemo

harmony:
  bundleName: app.lingxia.lxapp.example

ui:
  launch:
    initialSurface: main
  surfaces:
    - id: main
      presentation:
        style: window
      content:
        kind: lxapp
        appId: lingxia-showcase
    - id: assistant
      presentation:
        style: attachedPanel
        attachTo: main
        edge: trailing
      content:
        kind: lxapp
        appId: lingxia-chat
  activators:
    - id: assistantSidebar
      kind: sidebarItem
      hostSurface: main
      label: AI Chat
      icon: lingxia-chat/chat.svg
      action:
        kind: toggleSurface
        surface: assistant

resources:
  bundles:
    - type: lxapp
      path: lingxia-showcase
    - type: lxapp
      path: ../crates/lingxia-shell/webui
