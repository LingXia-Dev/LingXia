app:
  projectName: lingxia
  lingxiaId: lingxia-showcase
  productName: LingXia
  productVersion: 0.2.6
  platforms:
    - android
    - ios
    - macos
    - harmony
  homeAppId: lingxia-showcase

  lingxiaServer:
    developer: http://192.168.1.8:8080
    release: http://192.168.1.8:8080

android:
  packageId: com.lingxia.example.lxapp
  minSdk: 29
  targetSdk: 35
  compileSdk: 35

ios:
  bundleId: app.lingxia.example.lxapp
  deploymentTarget: "17.0"
  targetName: lxapp

macos:
  bundleId: app.lingxia.example.lxapp
  deploymentTarget: "12.0"
  targetName: LingXiaDemo
  executableName: LingXiaDemo

harmony:
  bundleName: app.lingxia.lxapp.example

features:
  appService: true
  shell: true
  devtools: false

capabilities:
  notifications: true
  terminal: true

resources:
  bundles:
    - type: lxapp
      appId: lingxia-showcase
      path: lingxia-showcase
    - type: lxapp
      appId: app.lingxia.browser
      path: ../crates/lingxia-shell/webui
    - type: lxapp
      appId: lingxia-chat

ui:
  launch:
    initialSurface: main
  surfaces:
    - id: main
      presentation:
        kind: window
      content:
        kind: lxapp
        appId: lingxia-showcase
    - id: assistant
      presentation:
        kind: attachPanel
        attachTo: main
        edge: trailing
      content:
        kind: lxapp
        appId: lingxia-chat
  activators:
    - id: assistantSidebar
      kind: sidebarItem
      hostSurface: main
      label: AI Chat
      icon: lingxia-chat/chat.svg
      action:
        kind: toggleSurface
        surface: assistant

appLinks:
  hosts:
    - applink.lingxia.app

storage:
  tempMaxSizeMB: 1024
  cacheMaxSizeMB: 2048
  dataMaxSizeMB: 4096
  appStorageMaxSizeMB: 16384
