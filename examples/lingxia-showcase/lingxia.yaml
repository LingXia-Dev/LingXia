app:
  projectName: lingxia
  lingxiaId: lingxia-showcase
  productName: LingXia
  productVersion: 0.2.6
  platforms:
    - android
    - ios
    - macos
    - harmony
    - windows
  homeAppId: lingxia-showcase

  lingxiaServer:
    developer: http://192.168.37.211:8080
    release: http://192.168.37.211:8080

android:
  packageId: com.lingxia.example.lxapp
  minSdk: 29
  targetSdk: 35
  compileSdk: 35

ios:
  bundleId: app.lingxia.example.lxapp
  deploymentTarget: "17.0"
  targetName: lxapp

macos:
  bundleId: app.lingxia.example.lxapp
  deploymentTarget: "12.0"
  targetName: LingXiaDemo
  executableName: LingXiaDemo

harmony:
  bundleName: app.lingxia.lxapp.example

windows:
  appId: app.lingxia.example.lxapp
  executableName: LingXiaDemo

features:
  appService: true
  devtools: false

browser:
  # In-monorepo dev — point at SDK source.
  # External apps omit this to use the npm default.
  webui:
    path: ../../crates/lingxia-browser-shell/webui

capabilities:
  notifications: true
  browser: true
  terminal: true

resources:
  bundles:
    - type: lxapp
      appId: lingxia-showcase
      path: lingxia-showcase
    - type: lxapp
      appId: lingxia-chat
      path: ../lingxia-chat

surfaces:
  - id: lingxia-showcase
    render: lxapp
    role: main
    launch: false
    tray:
      icon: icons/tray.svg
      label: LingXia
      action: activate
  - id: lingxia-chat
    render: lxapp
    role: aside
    edge: right
    sidebar:
      icon: icons/chat.svg
      label: AI Chat
  - id: terminal
    render: native
    role: aside
    edge: bottom
    platforms: [macos, windows] # terminal is desktop-only
    sidebar: {} # built-in terminal icon comes from the host; omit to use it

appLinks:
  hosts:
    - applink.lingxia.app

storage:
  tempMaxSizeMB: 1024
  cacheMaxSizeMB: 2048
  dataMaxSizeMB: 4096
  appStorageMaxSizeMB: 16384
