# Standalone crate: not part of the repo workspace (it is in the root
# Cargo.toml `exclude` list). The empty `[workspace]` table makes this crate
# its own workspace root so `cargo build` resolves it independently — including
# when the checkout is nested (e.g. a git worktree).
[workspace]

[package]
name = "rustlogic-lib"
version = "0.1.0"
edition = "2024"
description = "Native library for the Rust Logic Demo LingXia app (Shape C, no JS runtime)"
build = "build.rs"

[lib]
name = "lingxia"
# cdylib for Android/Harmony (.so), staticlib for iOS/macOS (.a)
crate-type = ["staticlib", "cdylib"]

[features]
# Shape C: NO `standard` (no JS AppService runtime). The macOS no-JS host only
# needs the base `lingxia` facade APIs, which are available without features.
default = []
standard = ["lingxia/standard"]
shell-runtime = ["lingxia/shell-runtime", "webview-input", "standard"]
terminal-runtime = ["lingxia/terminal-runtime"]
devtools = ["dep:lingxia_devtool", "lingxia_devtool/browser"]
webview-input = ["lingxia/webview-input"]

[dependencies]
lingxia = { version = "0.8.0", default-features = false }
lingxia_devtool = { package = "lingxia-devtool", version = "0.8.0", optional = true, default-features = false }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt", "macros", "time"] }

[build-dependencies]
lingxia-native-codegen = { version = "0.8.0" }

# Platform-specific dependencies for FFI
[target.'cfg(target_os = "android")'.dependencies]
jni = "0.22.1"

[target.'cfg(target_env = "ohos")'.dependencies]
napi-ohos = "1.1"
napi-derive-ohos = "1.1"

# Release profile: optimize for size
[profile.release]
opt-level = 'z'
lto = true
codegen-units = 1
strip = true

[patch.crates-io]
lingxia = { path = "../../../crates/lingxia" }
lingxia-app-context = { path = "../../../crates/lingxia-app-context" }
lingxia-browser = { path = "../../../crates/lingxia-browser" }
lingxia-devtool = { path = "../../../crates/lingxia-devtool" }
lingxia-devtool-protocol = { path = "../../../crates/lingxia-devtool-protocol" }
lingxia-log = { path = "../../../crates/lingxia-log" }
lingxia-logic = { path = "../../../crates/lingxia-logic" }
lingxia-lxapp = { path = "../../../crates/lingxia-lxapp" }
lingxia-media = { path = "../../../crates/lingxia-media" }
lingxia-messaging = { path = "../../../crates/lingxia-messaging" }
lingxia-native-codegen = { path = "../../../crates/lingxia-native-codegen" }
lingxia-native-macros = { path = "../../../crates/lingxia-native-macros" }
lingxia-platform = { path = "../../../crates/lingxia-platform" }
lingxia-provider = { path = "../../../crates/lingxia-provider" }
lingxia-proxy = { path = "../../../crates/lingxia-proxy" }
lingxia-service = { path = "../../../crates/lingxia-service" }
lingxia-settings = { path = "../../../crates/lingxia-settings" }
lingxia-shell = { path = "../../../crates/lingxia-shell" }
lingxia-terminal = { path = "../../../crates/lingxia-terminal" }
lingxia-transfer = { path = "../../../crates/lingxia-transfer" }
lingxia-update = { path = "../../../crates/lingxia-update" }
lingxia-webview = { path = "../../../crates/lingxia-webview" }
