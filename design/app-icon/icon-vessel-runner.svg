<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Dev Runner identity: a deep-indigo rounded plate (22.37% radius,
       transparent corners) so it stays clearly distinct from the light app
       icons in the taskbar, with the paper-white vessel + jade pearl. Windows
       draws app icons unmasked, so the rounding is baked in. -->
  <rect width="1024" height="1024" rx="229" fill="#312E81"/>
  <path d="M 288 430 L 288 588 Q 288 692 392 692 L 632 692 Q 736 692 736 588 L 736 430"
        fill="none" stroke="#F4F5F2" stroke-width="96" stroke-linecap="round"/>
  <circle cx="512" cy="410" r="102" fill="#1FDDA4"/>
</svg>
