[package]
name = "lingxia-logic"
version = "0.1.0"
edition = "2024"
description = "JavaScript runtime for LingXia lxapps(MiniApp)"
repository = "https://github.com/LingXia/LingXia"
keywords = ["javascript", "runtime", "miniapp", "webview"]
categories = ["web-programming", "api-bindings"]

[dependencies]
rong = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
log = "0.4.28"
lxapp = { path = "../lingxia-lxapp", package = "lingxia-lxapp" }
lingxia-platform = { path = "../lingxia-platform" }
lingxia-messaging = { path = "../lingxia-messaging" }
futures = { workspace = true }
rong_modules = { workspace = true }
rong_storage = { workspace = true }

[build-dependencies]
lingxia-gen = { path = "../tools/lingxia-gen" }
