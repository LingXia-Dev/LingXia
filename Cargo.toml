[workspace]
members = [
    "crates/lingxia-app-context",
    "crates/lingxia-devtool",
    "crates/lingxia-media",
    "crates/lingxia-shell",
    "crates/lingxia-browser",
    "crates/lingxia-transfer",
    "crates/lingxia-settings",
    "crates/lingxia-host-macros",
    "crates/lingxia-lxapp",
    "crates/lingxia-observability",
    "crates/lingxia-provider",
    "crates/lingxia-update",
    "crates/lingxia-webview",
    "crates/lingxia-platform",
    "crates/lingxia-logic",
    "crates/lingxia-messaging",
    "crates/lingxia",
    "crates/lingxia-proxy",
    "tools/lingxia-runner/runner-lib",
    "tools/lingxia-cli",
    "tools/lingxia-devtools-cli",
    "tools/lingxia-gen",
]
exclude = ["examples/lingxia-lib"]
resolver = "2"

[workspace.package]
version = "0.5.1"
edition = "2024"

[workspace.dependencies]
# Common dependencies that can be shared across workspace members
tokio = { version = "1.0", features = ["rt", "time", "macros", "sync"] }
futures = "0.3.31"
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0.143", features = ["raw_value"] }
http = "1.3.1"
http-body-util = "0.1.3"
bytes = "1.10.1"
thiserror = "2.0.16"
dashmap = "6.1.0"
urlencoding = "2.1.3"
base64 = "0.22.1"
log = "0.4.29"
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["registry"] }

# Workspace-local crates
lingxia-lxapp = { path = "crates/lingxia-lxapp", version = "0.5.1" }
lxapp = { package = "lingxia-lxapp", path = "crates/lingxia-lxapp", version = "0.5.1" }
lingxia_devtool = { package = "lingxia-devtool", path = "crates/lingxia-devtool", version = "0.5.1" }
lingxia-observability = { path = "crates/lingxia-observability", version = "0.5.1" }
lingxia-provider = { path = "crates/lingxia-provider", version = "0.5.1" }
lingxia-update = { path = "crates/lingxia-update", version = "0.5.1" }
lingxia-app-context = { path = "crates/lingxia-app-context", version = "0.5.1" }
lingxia-media = { path = "crates/lingxia-media", version = "0.5.1" }
lingxia-webview = { path = "crates/lingxia-webview", version = "0.5.1" }
lingxia-platform = { path = "crates/lingxia-platform", version = "0.5.1" }
lingxia-messaging = { path = "crates/lingxia-messaging", version = "0.5.1" }
lingxia-logic = { path = "crates/lingxia-logic", version = "0.5.1" }
lingxia = { path = "crates/lingxia", version = "0.5.1" }
lingxia-gen = { path = "tools/lingxia-gen", version = "0.1.0" }
lingxia-proxy = { path = "crates/lingxia-proxy", version = "0.5.1" }
lingxia-macro = { path = "crates/lingxia-host-macros", version = "0.5.1" }
lingxia-browser = { path = "crates/lingxia-browser", version = "0.5.1" }
lingxia-transfer = { path = "crates/lingxia-transfer", version = "0.5.1" }
lingxia-settings = { path = "crates/lingxia-settings", version = "0.5.1" }
lingxia-shell = { path = "crates/lingxia-shell", version = "0.5.1" }

# Harmony NAPI bindings
napi-ohos = "1.1.0"
napi-derive-ohos = "1.1.0"

# Rong runtime (published on crates.io)
rong = { version = "0.3.0", default-features = false }
rong_rt = { version = "0.3.0", default-features = false }
rong_modules = { version = "0.3.0", default-features = false }
rong_http = { version = "0.3.0", default-features = false }
rong_fs = "0.3.0"
rong_console = "0.3.0"
rong_event = "0.3.0"
rong_storage = "0.3.0"
rong_abort = "0.3.0"
rong_assert = "0.3.0"
rong_buffer = "0.3.0"
rong_encoding = "0.3.0"
rong_exception = "0.3.0"
rong_stream = "0.3.0"
rong_timer = "0.3.0"
rong_url = "0.3.0"
