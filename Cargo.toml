[workspace]
members = [
    "lingxia-lxapp",
    "lingxia-webview",
    "lingxia-platform",
    "lingxia-logic",
    "lingxia-messaging",
    "lingxia",
    "examples/lingxia-lib",
    "tools/lingxia-cli",
    "tools/lingxia-gen",
]
resolver = "2"

[workspace.package]
version = "0.1.3"
edition = "2024"

[workspace.dependencies]
# Common dependencies that can be shared across workspace members
tokio = { version = "1.0", features = ["time", "macros", "sync"] }
futures = "0.3.31"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0.143"
http = "1.3.1"
thiserror = "2.0.16"
dashmap = "6.1.0"
urlencoding = "2.1.3"
base64 = "0.22.1"

# Workspace-local crates
lingxia-lxapp = { path = "lingxia-lxapp", version = "0.1.1" }
lxapp = { package = "lingxia-lxapp", path = "lingxia-lxapp", version = "0.1.1" }
lingxia-webview = { path = "lingxia-webview", version = "0.1.1" }
lingxia-platform = { path = "lingxia-platform", version = "0.1.1" }
lingxia-messaging = { path = "lingxia-messaging", version = "0.1.1" }
lingxia-logic = { path = "lingxia-logic", version = "0.1.1" }
lingxia = { path = "lingxia", version = "0.1.1" }
lingxia-gen = { path = "tools/lingxia-gen", version = "0.1.1" }

# Harmony NAPI bindings
napi-ohos = "1.1.0"
napi-derive-ohos = "1.1.0"

# Rong runtime (published on crates.io)
rong = "0.1.1"
rong_modules = { version = "0.1.1", features = ["default", "storage"] }
rong_http = "0.1.1"
rong_fs = "0.1.1"
rong_console = "0.1.1"
rong_event = "0.1.1"
rong_storage = "0.1.1"

[profile.release]
opt-level = 'z'
# LTO disabled because we need to link to prebuilt static library (lingxia-cloud)
# that doesn't contain LLVM bitcode. Size optimization still achieved via opt-level.
lto = false
codegen-units = 1
