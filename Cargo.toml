[workspace]
members = [
    "lingxia-lxapp",
    "lingxia-webview",
    "lingxia-platform",
    "lingxia-logic",
    "lingxia-messaging",
    "lingxia",
    "examples/lingxia-lib",
    "tools/lingxia-cli",
    "tools/lingxia-gen",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"

[workspace.dependencies]
# Common dependencies that can be shared across workspace members
tokio = { version = "1.0", features = ["time", "macros", "sync"] }
futures = "0.3.31"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0.143"
http = "1.3.1"
thiserror = "2.0.16"
dashmap = "6.1.0"
urlencoding = "2.1.3"
base64 = "0.22.1"

# Harmony NAPI bindings
napi-ohos = "1.1.0"
napi-derive-ohos = "1.1.0"

# Local dependencies
rong = { path = "../starfire" }
rong_modules = { path = "../starfire/rong_modules", features=["default", "storage"]}
rong_http = { path = "../starfire/modules/rong_http" }
rong_fs = { path = "../starfire/modules/rong_fs" }
rong_console = { path = "../starfire/modules/rong_console" }
rong_event = { path = "../starfire/modules/rong_event" }
rong_storage = { path = "../starfire/modules/rong_storage" }

[profile.release]
opt-level = 'z'
# LTO disabled because we need to link to prebuilt static library (lingxia-cloud)
# that doesn't contain LLVM bitcode. Size optimization still achieved via opt-level.
lto = false
codegen-units = 1
